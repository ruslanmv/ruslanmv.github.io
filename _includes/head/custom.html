<style>
/* =========================================================================
   Self-contained masthead navigation (desktop dropdowns + mobile drawer)
   Dark bar, accent #06d6a0. Replaces the theme greedy-nav behaviour.
   ========================================================================= */
:root { --rmv-nav-bg:#191919; --rmv-nav-ink:#fff; --rmv-accent:#06d6a0; --rmv-panel:#1f1f1f; }

.masthead { background:var(--rmv-nav-bg); border-bottom:1px solid #000; position:relative; z-index:60; }
.masthead__inner-wrap { padding:0 1.25rem; max-width:1200px; box-sizing:border-box; width:100%; }

.rmv-nav { display:flex; align-items:center; gap:1rem; min-height:60px; max-width:100%; box-sizing:border-box; }
.rmv-nav__brand {
  font-family:'Montserrat',sans-serif; font-weight:700; font-size:1.15rem;
  color:var(--rmv-nav-ink); text-decoration:none; white-space:nowrap; margin-right:auto;
}
.rmv-nav__brand:hover { color:var(--rmv-accent); }

/* ---- desktop link bar ---- */
.rmv-nav__links { display:flex; align-items:center; gap:0.25rem; list-style:none; margin:0; padding:0; }
.rmv-nav__item { position:relative; display:flex; align-items:center; }
.rmv-nav__toplink {
  display:inline-flex; align-items:center; gap:0.25rem; color:var(--rmv-nav-ink);
  text-decoration:none; font-size:0.98rem; font-weight:500; padding:0.5rem 0.8rem; border-radius:8px;
  white-space:nowrap;
}
/* Default + visited share the same ink — :visited must not linger green
   (overrides the theme's a:visited rule, which has higher specificity than a class). */
.rmv-nav__toplink:visited { color:var(--rmv-nav-ink); }
.rmv-nav__toplink:hover, .rmv-nav__toplink:visited:hover,
.rmv-nav__item--has-children:hover .rmv-nav__toplink,
.rmv-nav__item.is-open .rmv-nav__toplink { color:var(--rmv-accent); }
/* keyboard focus */
.rmv-nav__toplink:focus-visible { outline:2px solid var(--rmv-accent); outline-offset:3px; color:var(--rmv-accent); }
/* current page/section only — green even when visited */
.rmv-nav__item.is-active > .rmv-nav__toplink,
.rmv-nav__item.is-active > .rmv-nav__toplink:visited { color:var(--rmv-accent); }
.rmv-nav__item.is-active > .rmv-nav__toplink::after {
  content:""; position:absolute; left:0.8rem; right:0.8rem; bottom:2px; height:2px;
  background:var(--rmv-accent); border-radius:2px;
}
.rmv-nav__item { position:relative; }
/* submenu + drawer: visited links stay neutral, accent only on hover/active */
.rmv-submenu a:visited { color:#d6d6d6; }
.rmv-submenu a:hover, .rmv-submenu a.is-active, .rmv-submenu a.is-active:visited { color:var(--rmv-accent); }
.rmv-drawer__nav a:visited { color:var(--rmv-nav-ink); }
.rmv-submenu a.is-active { color:var(--rmv-accent); }
.rmv-drawer__nav a.is-active, .rmv-drawer__nav a.is-active:visited { color:var(--rmv-accent); background:#1f2b25; }
.rmv-caret { font-size:0.7em; opacity:0.7; transition:transform 0.15s ease; }
.rmv-nav__item.is-open .rmv-caret { transform:rotate(180deg); }
.rmv-nav__expander { display:none; }  /* used only inside the drawer reuse; hidden on desktop bar */

/* ---- desktop dropdown ---- */
.rmv-submenu {
  position:absolute; top:100%; left:0; margin:0; padding:0.4rem 0; min-width:13.5rem;
  list-style:none; background:var(--rmv-panel); border:1px solid #2c2c2c; border-radius:10px;
  box-shadow:0 12px 30px rgba(0,0,0,0.35);
  opacity:0; visibility:hidden; transform:translateY(6px);
  transition:opacity 0.15s ease, transform 0.15s ease, visibility 0.15s ease; z-index:70;
}
.rmv-nav__item--has-children:hover > .rmv-submenu,
.rmv-nav__item.is-open > .rmv-submenu { opacity:1; visibility:visible; transform:translateY(0); }
.rmv-submenu li { margin:0; }
.rmv-submenu a {
  display:block; padding:0.6rem 1.1rem; color:#d6d6d6; text-decoration:none;
  font-size:0.92rem; white-space:nowrap;
}
.rmv-submenu a:hover { background:#2a2a2a; color:var(--rmv-accent); }

/* ---- actions (search + burger) ---- */
.rmv-nav__actions { display:flex; align-items:center; gap:0.4rem; margin-left:0.5rem; }
.rmv-nav__search, .rmv-burger {
  background:transparent; border:0; color:var(--rmv-nav-ink); cursor:pointer;
  width:42px; height:42px; display:inline-flex; align-items:center; justify-content:center;
  border-radius:10px; padding:0; transition:background-color .18s ease, color .18s ease;
  -webkit-tap-highlight-color:transparent;
}
.rmv-nav__search:hover { color:var(--rmv-accent); background:rgba(255,255,255,0.08); }
.rmv-burger:hover { background:rgba(255,255,255,0.08); }
.rmv-burger:focus-visible, .rmv-nav__search:focus-visible { outline:2px solid var(--rmv-accent); outline-offset:2px; }

/* the three bars sit in a fixed 22x16 box so they morph cleanly into an X */
.rmv-burger__bars { position:relative; width:22px; height:16px; display:block; }
.rmv-burger__bar {
  position:absolute; left:0; width:22px; height:2px; border-radius:2px;
  background:currentColor; color:var(--rmv-nav-ink);
  transition:transform .25s cubic-bezier(.4,.01,.25,1), opacity .2s ease, width .25s ease, background-color .18s ease;
}
.rmv-burger__bar:nth-child(1) { top:0; }
.rmv-burger__bar:nth-child(2) { top:7px; width:16px; }   /* middle bar a touch shorter = refined look */
.rmv-burger__bar:nth-child(3) { top:14px; }
.rmv-burger:hover .rmv-burger__bar { background:var(--rmv-accent); }
.rmv-burger:hover .rmv-burger__bar:nth-child(2) { width:22px; }   /* bars align on hover */

/* morph to a clean, centred X when the drawer is open */
body.rmv-drawer-open .rmv-burger__bar:nth-child(1) { transform:translateY(7px) rotate(45deg); }
body.rmv-drawer-open .rmv-burger__bar:nth-child(2) { opacity:0; transform:scaleX(0); }
body.rmv-drawer-open .rmv-burger__bar:nth-child(3) { transform:translateY(-7px) rotate(-45deg); }
body.rmv-drawer-open .rmv-burger__bar { width:22px; }

/* ---- slide-out drawer (all devices) ---- */
.rmv-drawer-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:90; opacity:0; transition:opacity 0.2s ease; }
.rmv-drawer-overlay.is-open { opacity:1; }
.rmv-drawer {
  position:fixed; top:0; right:0; height:100%; width:min(88vw, 340px);
  background:var(--rmv-nav-bg); color:var(--rmv-nav-ink); z-index:100;
  transform:translateX(100%); transition:transform 0.25s ease; display:flex; flex-direction:column;
  box-shadow:-12px 0 30px rgba(0,0,0,0.35);
}
.rmv-drawer.is-open { transform:translateX(0); }
.rmv-drawer__head { display:flex; align-items:center; justify-content:space-between; padding:1rem 1.25rem; border-bottom:1px solid #2c2c2c; }
.rmv-drawer__brand { font-family:'Montserrat',sans-serif; font-weight:700; font-size:1rem; }
.rmv-drawer__close { background:transparent; border:0; color:var(--rmv-nav-ink); font-size:1.9rem; line-height:1; cursor:pointer; width:44px; height:44px; }
.rmv-drawer__close:hover { color:var(--rmv-accent); }
.rmv-drawer__nav { flex:1; overflow-y:auto; padding:0.5rem 0; }
.rmv-drawer__nav ul { list-style:none; margin:0; padding:0; }
.rmv-drawer__nav a {
  display:flex; align-items:center; min-height:48px; padding:0.4rem 1.5rem; color:var(--rmv-nav-ink);
  text-decoration:none; font-size:1.05rem;
}
.rmv-drawer__nav a:hover { background:#262626; color:var(--rmv-accent); }
.rmv-drawer__nav li.is-indent a { padding-left:2.5rem; font-size:0.97rem; color:#bdbdbd; }
.rmv-drawer__social { display:flex; gap:0.5rem; padding:1rem 1.25rem; border-top:1px solid #2c2c2c; }
.rmv-drawer__social a { width:44px; height:44px; display:flex; align-items:center; justify-content:center; color:var(--rmv-nav-ink); font-size:1.2rem; border-radius:8px; }
.rmv-drawer__social a:hover { color:var(--rmv-accent); background:rgba(255,255,255,0.06); }

/* ---- responsive: hide desktop links on mobile, rely on burger ---- */
@media (max-width: 820px) {
  .rmv-nav__links { display:none; }
  .rmv-nav { min-height:56px; gap:0.5rem; }
  .rmv-nav__brand { font-size:1rem; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; min-width:0; }
  .rmv-nav__actions { margin-left:0; flex:0 0 auto; }
  .masthead__inner-wrap { padding:0 0.75rem; }
}
/* The burger stays visible on every breakpoint (full sitemap access). */

/* ============================================================
   Post figures — inline SVG diagrams and embedded simulations
   ============================================================ */
.post-figure { margin:2rem auto; max-width:880px; text-align:center; }
.post-figure img { width:100%; height:auto; display:block; border-radius:14px;
  background:#07111f; box-shadow:0 14px 36px rgba(0,0,0,0.18); }
.post-figure figcaption { margin:0.75rem auto 0; max-width:720px;
  color:#6c726c; font-size:0.92rem; line-height:1.55; font-style:italic; text-align:center; }
.post-figure--sim iframe { width:100%; height:920px; border:0; border-radius:18px;
  background:#07111f; box-shadow:0 18px 44px rgba(0,0,0,0.28); }
@media (min-width:780px) { .post-figure--sim iframe { height:780px; } }
@media (min-width:1100px){ .post-figure--sim iframe { height:720px; } }
</style>

<script>
(function () {
  function ready(fn){ if(document.readyState!=='loading'){fn();} else {document.addEventListener('DOMContentLoaded',fn);} }
  ready(function () {
    var body = document.body;

    /* ----- desktop dropdowns: open on hover (CSS) + click-to-open ----- */
    var parents = document.querySelectorAll('.rmv-nav__item--has-children');
    parents.forEach(function (li) {
      var link = li.querySelector('.rmv-nav__toplink');
      if (!link) return;
      link.addEventListener('click', function (e) {
        if (window.matchMedia('(min-width: 821px)').matches) {
          if (!li.classList.contains('is-open')) {
            // First click opens the menu (don't follow the link yet)
            e.preventDefault();
            parents.forEach(function (o){ o.classList.remove('is-open'); o.querySelector('.rmv-nav__toplink').setAttribute('aria-expanded','false'); });
            li.classList.add('is-open'); link.setAttribute('aria-expanded','true');
          }
          // If already open, a second click follows the link normally.
        }
      });
    });
    document.addEventListener('click', function (e) {
      if (!e.target.closest('.rmv-nav__item--has-children')) {
        parents.forEach(function (o){ o.classList.remove('is-open'); });
      }
    });

    /* ----- burger drawer ----- */
    var burger  = document.querySelector('.rmv-burger');
    var drawer  = document.getElementById('rmv-drawer');
    var overlay = document.querySelector('.rmv-drawer-overlay');
    var closeBt = document.querySelector('.rmv-drawer__close');

    function openDrawer(){
      if(!drawer) return;
      overlay.hidden = false;
      requestAnimationFrame(function(){ overlay.classList.add('is-open'); drawer.classList.add('is-open'); });
      drawer.setAttribute('aria-hidden','false');
      if(burger) burger.setAttribute('aria-expanded','true');
      body.classList.add('rmv-drawer-open');
    }
    function closeDrawer(){
      if(!drawer) return;
      overlay.classList.remove('is-open'); drawer.classList.remove('is-open');
      drawer.setAttribute('aria-hidden','true');
      if(burger) burger.setAttribute('aria-expanded','false');
      body.classList.remove('rmv-drawer-open');
      setTimeout(function(){ overlay.hidden = true; }, 220);
    }
    if(burger)  burger.addEventListener('click', openDrawer);
    if(closeBt) closeBt.addEventListener('click', closeDrawer);
    if(overlay) overlay.addEventListener('click', closeDrawer);
    document.addEventListener('keydown', function(e){ if(e.key==='Escape') closeDrawer(); });
  });
})();
</script>
