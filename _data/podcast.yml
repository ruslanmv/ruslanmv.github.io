# =============================================================================
#  Podcast channel metadata  —  single source of truth for /podcast.xml
#
#  The feed (podcast.xml) is generated by Jekyll from this file plus every
#  document with `audio: true` that has a matching entry in
#  _data/audio_manifest.json (the audio pipeline's output). Edit channel-level
#  values here; per-episode values come from each post's front matter.
#
#  Apple cover-art rules: square JPG/PNG, RGB, 1400×1400–3000×3000 px.
#  `assets/images/podcast-cover.png` is a 512×512 placeholder — replace it with
#  a ≥1400×1400 artwork before submitting to Apple Podcasts. Podcast Index and
#  most open directories accept the current size.
# =============================================================================

title: "Ruslan Magana — Audio Essays"
# Shown in apps under the title. Keep it tight and human.
subtitle: "Long-form essays on autonomous AI, agents, memory, and systems."
description: >-
  Narrated long-form essays by Ruslan Magana Vsevolodovna on autonomous AI,
  multi-agent systems, memory, machine-learning infrastructure, and the
  architecture of intelligence. Each episode is the audio version of an essay
  published at ruslanmv.com/essays.

# Public landing page for the show (subscribe links).
link: "https://ruslanmv.com/podcast/"

# RSS feed URL (self-reference, used by <atom:link rel="self">).
feed_url: "https://ruslanmv.com/podcast.xml"

language: "en-us"
author: "Ruslan Magana Vsevolodovna"
owner_name: "Ruslan Magana Vsevolodovna"
owner_email: "contact@ruslanmv.com"

# Cover art (absolute path from site root). See note above on size.
image: "/assets/images/podcast-cover.png"

# Apple/iTunes taxonomy. https://podcasters.apple.com/support/1691-apple-podcasts-categories
category: "Technology"
subcategory: ""

# "episodic" (standalone essays, newest first) or "serial".
type: "episodic"
explicit: false
copyright: "© Ruslan Magana Vsevolodovna"

# Optional Podcasting 2.0 GUID for the feed (stable show identifier). Generate
# once (e.g. uuidgen) and keep it forever; leave blank to omit the tag.
guid: ""
