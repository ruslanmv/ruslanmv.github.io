# Single source of truth for Courses.
# Used by /courses/ (index), /learn/ (Courses section), and each course landing
# page (_pages/courses/<id>.md sets `course_id` and the `course` layout looks it
# up here). Each course has an indexable landing page on ruslanmv.com that links
# out to its GitHub repository.
- id: agentic-ai
  title: "Agentic AI Tutorial"
  slug: /courses/agentic-ai/
  icon: "fas fa-robot"
  short: "Build intelligent agents with tools, memory, and reasoning."
  description: "A hands-on tutorial for building agentic AI systems in Python — agents that use tools, memory, and reasoning to complete real-world tasks, from a single agent to multi-agent orchestration."
  github: "https://github.com/ruslanmv/agentic-ai-tutorial"
  difficulty: "Intermediate"
  duration: "Self-paced"
  guide: { title: "AI Agents", url: /ai-agents/ }
  audience: "Python developers and ML engineers who want to build production-minded AI agents."
  learn:
    - "How agents plan, use tools, and maintain memory"
    - "Building single-agent and multi-agent workflows"
    - "Connecting agents to external tools and APIs"
    - "Patterns for reliable, observable, production-ready agents"
  prerequisites:
    - "Comfortable writing Python"
    - "Basic familiarity with LLMs and REST APIs"
  modules:
    - "Agent fundamentals: tools, memory, and reasoning"
    - "Building your first agent end to end"
    - "Multi-agent orchestration and coordination"
    - "Evaluation, observability, and deployment"
- id: financial-ai
