<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" width="1200" height="750" role="img" aria-label="A flat memory pile routed into a few selected typed context experts and a budgeted pack">
  <defs>
    <radialGradient id="mcbg" cx="0.4" cy="0.5" r="0.85">
      <stop offset="0" stop-color="#0b2018"/><stop offset="0.6" stop-color="#07150f"/><stop offset="1" stop-color="#040c08"/>
    </radialGradient>
    <radialGradient id="mchalo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#7dffd0"/><stop offset="0.5" stop-color="#2fd996"/><stop offset="1" stop-color="#0a7d4f" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="750" fill="url(#mcbg)"/>

  <!-- left: the undifferentiated "pile" — many faint, untyped memories -->
  <g fill="#1e6b4c" opacity="0.5">
    <circle cx="150" cy="300" r="6"/><circle cx="205" cy="340" r="5"/><circle cx="120" cy="380" r="5"/>
    <circle cx="185" cy="400" r="6"/><circle cx="240" cy="300" r="5"/><circle cx="160" cy="455" r="5"/>
    <circle cx="225" cy="445" r="6"/><circle cx="120" cy="450" r="4"/><circle cx="255" cy="385" r="5"/>
    <circle cx="195" cy="290" r="4"/><circle cx="140" cy="345" r="4"/><circle cx="270" cy="430" r="4"/>
  </g>
  <text x="190" y="540" font-family="Georgia, serif" font-size="22" font-style="italic" fill="#5f8c79" text-anchor="middle" opacity="0.8">one flat pile</text>

  <!-- flow into the router -->
  <g stroke="#2fd996" stroke-width="1.4" opacity="0.45">
    <line x1="285" y1="375" x2="470" y2="375"/>
  </g>
  <path d="M455 367 L478 375 L455 383 Z" fill="#2fd996" opacity="0.6"/>

  <!-- center: the hybrid router hub -->
  <circle cx="520" cy="375" r="78" fill="url(#mchalo)" opacity="0.55"/>
  <circle cx="520" cy="375" r="20" fill="#7dffd0"/>
  <circle cx="520" cy="375" r="34" fill="none" stroke="#2fd996" stroke-width="1.5" opacity="0.7"/>

  <!-- edges: bright to the selected typed experts, dim to the unselected -->
  <g stroke-width="1.6" fill="none">
    <line x1="520" y1="375" x2="820" y2="190" stroke="#7dffd0" opacity="0.75"/>
    <line x1="520" y1="375" x2="905" y2="330" stroke="#7dffd0" opacity="0.75"/>
    <line x1="520" y1="375" x2="845" y2="545" stroke="#7dffd0" opacity="0.75"/>
    <line x1="520" y1="375" x2="760" y2="270" stroke="#1e6b4c" opacity="0.3"/>
    <line x1="520" y1="375" x2="730" y2="470" stroke="#1e6b4c" opacity="0.3"/>
    <line x1="520" y1="375" x2="980" y2="430" stroke="#1e6b4c" opacity="0.3"/>
  </g>

  <!-- unselected experts: dim -->
  <g fill="#143f2d" stroke="#1e6b4c" stroke-width="1.5">
    <circle cx="760" cy="270" r="13"/><circle cx="730" cy="470" r="13"/><circle cx="980" cy="430" r="13"/>
  </g>
  <!-- selected experts: glowing -->
  <g>
    <circle cx="820" cy="190" r="40" fill="url(#mchalo)" opacity="0.6"/><circle cx="820" cy="190" r="15" fill="#7dffd0"/>
    <circle cx="905" cy="330" r="40" fill="url(#mchalo)" opacity="0.6"/><circle cx="905" cy="330" r="15" fill="#7dffd0"/>
    <circle cx="845" cy="545" r="40" fill="url(#mchalo)" opacity="0.6"/><circle cx="845" cy="545" r="15" fill="#7dffd0"/>
  </g>

  <!-- right: the budgeted, inspectable pack -->
  <g>
    <rect x="1030" y="300" width="120" height="26" rx="6" fill="#0c2a1e" stroke="#2fd996" stroke-width="1.5"/>
    <rect x="1030" y="338" width="120" height="26" rx="6" fill="#0c2a1e" stroke="#2fd996" stroke-width="1.5"/>
    <rect x="1030" y="376" width="120" height="26" rx="6" fill="#0c2a1e" stroke="#1e6b4c" stroke-width="1.3" opacity="0.5"/>
  </g>
  <text x="1090" y="438" font-family="Georgia, serif" font-size="20" font-style="italic" fill="#7dffd0" text-anchor="middle" opacity="0.85">a budgeted pack</text>

  <text x="600" y="690" font-family="Georgia, serif" font-size="26" fill="#bfe9d6" text-anchor="middle" opacity="0.92">route the few · retrieve · pack · explain</text>
</svg>
