<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 460" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Genoa port skyline at dusk, abstract technical overlay">
  <defs>
    <linearGradient id="g-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#06231a"/>
      <stop offset="0.5" stop-color="#072a1e"/>
      <stop offset="1" stop-color="#031410"/>
    </linearGradient>
    <linearGradient id="g-left" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#03100c"/>
      <stop offset="0.6" stop-color="#03100c" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#03100c" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="g-glow" cx="0.78" cy="0.42" r="0.6">
      <stop offset="0" stop-color="#0f9d63" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#0a7d4f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="g-wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#16c98a" stop-opacity="0"/>
      <stop offset="0.55" stop-color="#36e0a8" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#7dffd0" stop-opacity="0.95"/>
    </linearGradient>
    <filter id="g-soft"><feGaussianBlur stdDeviation="1.1"/></filter>
  </defs>

  <rect width="1600" height="460" fill="url(#g-sky)"/>
  <rect width="1600" height="460" fill="url(#g-glow)"/>

  <!-- distant hills (Genoa is between hills and sea) -->
  <path d="M820 250 Q1000 175 1180 235 Q1330 285 1450 225 Q1540 195 1600 230 L1600 330 L820 330 Z" fill="#0a2a1f" opacity="0.8"/>
  <path d="M1050 270 Q1250 205 1420 260 Q1520 290 1600 265 L1600 340 L1050 340 Z" fill="#0c3327" opacity="0.7"/>

  <!-- city skyline silhouette -->
  <g fill="#0e3b2c">
    <rect x="860" y="262" width="26" height="68"/><rect x="892" y="246" width="20" height="84"/>
    <rect x="918" y="276" width="30" height="54"/><rect x="954" y="232" width="18" height="98"/>
    <rect x="978" y="258" width="26" height="72"/><rect x="1010" y="240" width="22" height="90"/>
    <rect x="1040" y="270" width="34" height="60"/><rect x="1082" y="226" width="18" height="104"/>
    <rect x="1106" y="256" width="28" height="74"/><rect x="1140" y="244" width="20" height="86"/>
    <rect x="1166" y="272" width="32" height="58"/><rect x="1206" y="234" width="18" height="96"/>
    <rect x="1230" y="260" width="26" height="70"/><rect x="1262" y="248" width="22" height="82"/>
    <rect x="1292" y="274" width="30" height="56"/><rect x="1330" y="238" width="18" height="92"/>
    <rect x="1354" y="262" width="26" height="68"/><rect x="1386" y="250" width="22" height="80"/>
    <rect x="1416" y="270" width="32" height="60"/><rect x="1456" y="244" width="18" height="86"/>
    <rect x="1480" y="264" width="28" height="66"/><rect x="1514" y="252" width="22" height="78"/>
    <rect x="1546" y="272" width="30" height="58"/>
  </g>
  <!-- a lighthouse / tower (Genoa's Lanterna) -->
  <rect x="1500" y="196" width="12" height="134" fill="#0e3b2c"/>
  <circle cx="1506" cy="192" r="6" fill="#7dffd0" opacity="0.85"/>
  <!-- window lights -->
  <g fill="#9fffd9" opacity="0.85">
    <circle cx="900" cy="270" r="1.5"/><circle cx="962" cy="258" r="1.5"/><circle cx="1018" cy="266" r="1.5"/>
    <circle cx="1088" cy="252" r="1.5"/><circle cx="1148" cy="270" r="1.5"/><circle cx="1212" cy="260" r="1.5"/>
    <circle cx="1268" cy="274" r="1.5"/><circle cx="1336" cy="262" r="1.5"/><circle cx="1392" cy="276" r="1.5"/>
    <circle cx="1462" cy="270" r="1.5"/><circle cx="1520" cy="278" r="1.5"/>
    <circle cx="934" cy="290" r="1.5"/><circle cx="1056" cy="296" r="1.5"/><circle cx="1180" cy="294" r="1.5"/><circle cx="1300" cy="298" r="1.5"/><circle cx="1430" cy="296" r="1.5"/>
  </g>

  <!-- harbour water with reflections -->
  <rect x="820" y="330" width="780" height="130" fill="#04130e"/>
  <g stroke="#1f6b50" stroke-width="2" opacity="0.5">
    <line x1="860" y1="350" x2="980" y2="350"/><line x1="1050" y1="362" x2="1210" y2="362"/>
    <line x1="1260" y1="352" x2="1380" y2="352"/><line x1="1420" y1="370" x2="1560" y2="370"/>
    <line x1="900" y1="384" x2="1080" y2="384"/><line x1="1180" y1="392" x2="1340" y2="392"/>
  </g>
  <g stroke="#36e0a8" stroke-width="2" opacity="0.35">
    <line x1="1506" y1="330" x2="1506" y2="420"/>
  </g>

  <!-- left fade so the headline stays readable -->
  <rect width="1600" height="460" fill="url(#g-left)"/>

  <!-- binary texture, far left -->
  <g fill="#15392a" font-family="monospace" font-size="13" opacity="0.55">
    <text x="40" y="70">10110</text><text x="120" y="120">0110</text><text x="60" y="180">11001</text>
    <text x="150" y="250">0101</text><text x="36" y="320">10011</text><text x="120" y="380">1100</text>
    <text x="220" y="150">01101</text><text x="250" y="300">1001</text>
  </g>

  <!-- futuristic green data-wave overlay -->
  <g filter="url(#g-soft)">
    <path d="M620 300 C 960 150, 1180 400, 1620 200" fill="none" stroke="url(#g-wave)" stroke-width="2.2" opacity="0.95"/>
    <path d="M660 340 C 1000 200, 1220 430, 1620 250" fill="none" stroke="url(#g-wave)" stroke-width="1.6" opacity="0.7"/>
    <path d="M700 250 C 1030 120, 1260 330, 1620 150" fill="none" stroke="url(#g-wave)" stroke-width="1.4" opacity="0.55"/>
  </g>
  <g fill="#7dffd0">
    <circle cx="1040" cy="250" r="2.2" opacity="0.9"/><circle cx="1200" cy="300" r="1.8" opacity="0.8"/>
    <circle cx="1320" cy="210" r="2.4" opacity="0.95"/><circle cx="1460" cy="240" r="1.6" opacity="0.7"/>
    <circle cx="980" cy="210" r="1.6" opacity="0.7"/><circle cx="1540" cy="180" r="2.0" opacity="0.85"/>
  </g>
</svg>
