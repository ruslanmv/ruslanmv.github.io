<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" font-family="'Segoe UI',system-ui,sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="-10%" r="120%"><stop offset="0%" stop-color="#1b1b3a"/><stop offset="55%" stop-color="#0c0b1c"/><stop offset="100%" stop-color="#07060f"/></radialGradient>
    <filter id="g" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <linearGradient id="scan" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#000" stop-opacity="0"/><stop offset="100%" stop-color="#000" stop-opacity="0.3"/></linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- floating neon gems (color + shape) -->
  <g filter="url(#g)">
    <circle cx="150" cy="160" r="34" fill="#ff2d55"/>
    <rect x="978" y="120" width="64" height="64" rx="12" fill="#21e600"/>
    <polygon points="200,470 234,524 166,524" fill="#ffd400"/>
    <polygon points="1010,300 1044,334 1010,368 976,334" fill="#ff9000"/>
    <polygon points="150,300 168,330 150,360 132,330" fill="#ff00d4"/>
    <polygon points="1040,470 1056,500 1088,504 1064,526 1070,558 1040,542 1010,558 1016,526 992,504 1024,500" fill="#b026ff"/>
    <path d="M1010 150 c-14,-18 -42,-6 -42,14 c0,18 24,30 42,46 c18,-16 42,-28 42,-46 c0,-20 -28,-32 -42,-14 z" fill="#00f0ff"/>
    <circle cx="170" cy="560" r="26" fill="#00f0ff"/>
  </g>

  <text x="600" y="268" text-anchor="middle" fill="#ff00d4" font-size="76" font-weight="800" letter-spacing="4" filter="url(#g)">MATCH-3</text>
  <text x="600" y="316" text-anchor="middle" fill="#00f0ff" font-size="26" font-weight="700" letter-spacing="10">UNDER CONTRACT</text>

  <text x="600" y="392" text-anchor="middle" fill="#b9b9e6" font-size="21" letter-spacing="1">
    built in <tspan fill="#ffd400" font-weight="700">5 governed batches</tspan> by <tspan fill="#8A63D2" font-weight="700">Claude Opus 4.8</tspan>
  </text>
  <text x="600" y="424" text-anchor="middle" fill="#8b8bb0" font-size="18" letter-spacing="3">GitPilot × Matrix Builder · every batch validated before commit</text>

  <g transform="translate(600,560)">
    <rect x="-235" y="-20" width="470" height="34" rx="17" fill="#0a1a0a" stroke="#21e600" stroke-opacity="0.6"/>
    <text x="0" y="4" text-anchor="middle" fill="#21e600" font-size="16" letter-spacing="2">5 × MATRIX_STATUS: approved · score 100 · 0 out-of-scope edits</text>
  </g>
  <rect width="1200" height="630" fill="url(#scan)" opacity="0.5"/>
</svg>
