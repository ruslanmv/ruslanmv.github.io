<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" font-family="'Segoe UI',system-ui,sans-serif">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1b2a55"/><stop offset="55%" stop-color="#6b4a4a"/><stop offset="100%" stop-color="#c97a3c"/>
    </linearGradient>
    <filter id="g" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1200" height="630" fill="url(#sky)"/>
  <!-- skyline silhouettes -->
  <g fill="#3a2a33" opacity="0.7">
    <rect x="60" y="300" width="90" height="200"/><rect x="170" y="250" width="70" height="250"/>
    <rect x="900" y="270" width="80" height="230"/><rect x="1010" y="230" width="90" height="270"/>
  </g>
  <!-- platforms -->
  <g><rect x="120" y="470" width="160" height="26" rx="5" fill="#5a4632"/><rect x="120" y="470" width="160" height="7" fill="#5fa84a"/>
     <rect x="900" y="430" width="160" height="26" rx="5" fill="#46566a"/><rect x="900" y="430" width="160" height="7" fill="#7fd0ff"/></g>
  <!-- coins arc -->
  <g fill="#ffcf33" filter="url(#g)"><circle cx="470" cy="300" r="16"/><circle cx="540" cy="265" r="16"/><circle cx="610" cy="250" r="16"/><circle cx="680" cy="265" r="16"/></g>
  <!-- RMD star -->
  <g filter="url(#g)"><polygon points="800,180 818,222 864,222 827,250 841,296 800,268 759,296 773,250 736,222 782,222" fill="#3a7bff"/><text x="800" y="240" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">RMD</text></g>
  <!-- robot hero -->
  <g filter="url(#g)" transform="translate(210,392)">
    <rect x="-22" y="-6" width="44" height="46" rx="9" fill="#c9cdd6"/>
    <rect x="-20" y="2" width="40" height="22" rx="6" fill="#10243f"/>
    <circle cx="-7" cy="13" r="4" fill="#36c2ff"/><circle cx="9" cy="13" r="4" fill="#36c2ff"/>
    <path d="M-22 -4 a22 18 0 0 1 44 0 z" fill="#ffb000"/>
  </g>
  <!-- Matrix Gate -->
  <g filter="url(#g)" transform="translate(1090,330)"><rect x="-44" y="-90" width="88" height="180" rx="10" fill="#2b3550" stroke="#7fd0ff" stroke-opacity="0.5"/><ellipse cx="0" cy="0" rx="30" ry="70" fill="#1f6fff" opacity="0.85"/></g>

  <text x="600" y="120" text-anchor="middle" font-size="74" font-weight="800" letter-spacing="3" filter="url(#g)"><tspan fill="#ffffff">CONTRACT </tspan><tspan fill="#ffa500">QUEST</tspan></text>
  <text x="600" y="560" text-anchor="middle" fill="#ffe6c7" font-size="20" letter-spacing="1">A governed arcade platformer · built with <tspan fill="#10a37f" font-weight="700">gpt-oss-120b</tspan> on <tspan fill="#7fb0ff" font-weight="700">watsonx</tspan> · under a Matrix Builder contract</text>
  <text x="600" y="596" text-anchor="middle" fill="#caa37a" font-size="15" letter-spacing="2">6 governed batches · watsonx only · RMD-101 · RMD-103 · RMD-111</text>
</svg>
