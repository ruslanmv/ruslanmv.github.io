<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 470" font-family="'Hanken Grotesk',system-ui,Arial,sans-serif" role="img" aria-label="The ReAct loop: question, then repeating Thought, Action, Observation cycle calling tools, until a final answer">
  <defs>
    <marker id="arx" markerWidth="12" markerHeight="12" refX="9" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#0b7d4f"/></marker>
    <marker id="arl" markerWidth="13" markerHeight="13" refX="9" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#0f9d63"/></marker>
    <filter id="srx" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#10231a" flood-opacity="0.10"/></filter>
    <linearGradient id="hrx" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0f9d63"/><stop offset="1" stop-color="#0b5a3f"/></linearGradient>
  </defs>
  <rect width="1200" height="470" fill="#f8faf8"/>
  <text x="40" y="50" font-size="26" font-weight="800" fill="#152019">The ReAct loop: reason, act, observe — repeat</text>
  <text x="40" y="80" font-size="16" fill="#5c6b63">The model plans the next step; your code runs the tools and returns observations.</text>

  <!-- Question -->
  <g filter="url(#srx)"><rect x="40" y="200" width="150" height="80" rx="14" fill="#ffffff" stroke="#dfe6e0"/></g>
  <text x="115" y="235" font-size="15" font-weight="700" fill="#152019" text-anchor="middle">Question</text>
  <text x="115" y="258" font-size="13" fill="#46514b" text-anchor="middle">"Is this email</text>
  <text x="115" y="274" font-size="13" fill="#46514b" text-anchor="middle">suspicious?"</text>

  <!-- Loop container -->
  <rect x="250" y="120" width="640" height="250" rx="20" fill="#eef7f1" stroke="#cfe6da"/>
  <text x="270" y="148" font-size="13" font-weight="800" letter-spacing="1" fill="#0b7d4f">REASON · ACT · OBSERVE</text>

  <!-- Thought -->
  <g filter="url(#srx)"><rect x="300" y="170" width="180" height="76" rx="13" fill="#ffffff" stroke="#dfe6e0"/></g>
  <rect x="300" y="170" width="180" height="26" rx="13" fill="url(#hrx)"/><rect x="300" y="184" width="180" height="12" fill="url(#hrx)"/>
  <text x="390" y="188" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">1 · Thought</text>
  <text x="390" y="224" font-size="13" fill="#46514b" text-anchor="middle">decide what to check</text>

  <!-- Action -->
  <g filter="url(#srx)"><rect x="640" y="170" width="180" height="76" rx="13" fill="#ffffff" stroke="#dfe6e0"/></g>
  <rect x="640" y="170" width="180" height="26" rx="13" fill="url(#hrx)"/><rect x="640" y="184" width="180" height="12" fill="url(#hrx)"/>
  <text x="730" y="188" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">2 · Action</text>
  <text x="730" y="224" font-size="13" fill="#46514b" text-anchor="middle">call a tool</text>

  <!-- Observation -->
  <g filter="url(#srx)"><rect x="470" y="280" width="200" height="72" rx="13" fill="#ffffff" stroke="#dfe6e0"/></g>
  <text x="570" y="312" font-size="14" font-weight="700" fill="#152019" text-anchor="middle">3 · Observation</text>
  <text x="570" y="334" font-size="13" fill="#46514b" text-anchor="middle">read the tool result</text>

  <!-- cycle arrows -->
  <line x1="480" y1="208" x2="636" y2="208" stroke="#0f9d63" stroke-width="3" marker-end="url(#arl)"/>
  <path d="M730 246 C 730 300, 690 316, 672 316" stroke="#0f9d63" stroke-width="3" fill="none" marker-end="url(#arl)"/>
  <path d="M470 316 C 420 316, 390 300, 390 250" stroke="#0f9d63" stroke-width="3" fill="none" marker-end="url(#arl)"/>
  <text x="558" y="200" font-size="12" fill="#0b5a3f">act</text>
  <text x="700" y="300" font-size="12" fill="#0b5a3f">observe</text>
  <text x="395" y="300" font-size="12" fill="#0b5a3f">repeat</text>

  <!-- Tools -->
  <g filter="url(#srx)"><rect x="980" y="280" width="180" height="90" rx="13" fill="#ffffff" stroke="#dfe6e0"/></g>
  <text x="1070" y="308" font-size="14" font-weight="700" fill="#152019" text-anchor="middle">Tools (your code)</text>
  <text x="1070" y="330" font-size="12.5" fill="#46514b" text-anchor="middle" font-family="monospace">check_sender_reputation</text>
  <text x="1070" y="348" font-size="12.5" fill="#46514b" text-anchor="middle" font-family="monospace">scan_url</text>
  <path d="M820 222 C 900 222, 980 270, 1000 300" stroke="#0b7d4f" stroke-width="2.5" fill="none" marker-end="url(#arx)"/>
  <path d="M1000 350 C 940 380, 700 380, 650 354" stroke="#8a978f" stroke-width="2.5" stroke-dasharray="5 5" fill="none" marker-end="url(#arx)"/>
  <text x="870" y="245" font-size="12" fill="#8a978f">run</text>

  <!-- in / out -->
  <line x1="192" y1="240" x2="296" y2="220" stroke="#0b7d4f" stroke-width="3" marker-end="url(#arx)"/>
  <g filter="url(#srx)"><rect x="980" y="160" width="180" height="80" rx="14" fill="#eaf6ef" stroke="#9ed7bb"/></g>
  <text x="1070" y="195" font-size="15" font-weight="700" fill="#0b5a3f" text-anchor="middle">Final Answer</text>
  <text x="1070" y="218" font-size="13" fill="#0b5a3f" text-anchor="middle">phishing · spam · legit</text>
  <path d="M480 188 C 760 120, 900 150, 976 188" stroke="#0b7d4f" stroke-width="3" fill="none" marker-end="url(#arx)"/>
  <text x="700" y="132" font-size="12" fill="#8a978f">enough evidence →</text>
</svg>
