<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 250" font-family="Inter, Segoe UI, system-ui, sans-serif">
  <defs>
    <marker id="pa" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#8A63D2"/></marker>
  </defs>
  <rect width="920" height="250" rx="16" fill="#14101f"/>
  <text x="36" y="44" fill="#fff" font-size="20" font-weight="700">Pair once, then call the router from any code</text>

  <rect x="36"  y="86" width="180" height="92" rx="10" fill="#1f1830" stroke="#8A63D2"/>
  <text x="126" y="116" fill="#c4a9ff" text-anchor="middle" font-size="13" font-weight="700">Dashboard</text>
  <text x="126" y="138" fill="#b9a6d8" text-anchor="middle" font-size="11">app.ollabridge.com</text>
  <text x="126" y="158" fill="#7fae97" text-anchor="middle" font-size="12" font-family="monospace">ABCD-1234</text>

  <rect x="276" y="86" width="180" height="92" rx="10" fill="#101a2b" stroke="#3b6fb0"/>
  <text x="366" y="116" fill="#7cc0ff" text-anchor="middle" font-size="13" font-weight="700">pair.py</text>
  <text x="366" y="138" fill="#9bb6cf" text-anchor="middle" font-size="11">POST /device/pair-simple</text>
  <text x="366" y="158" fill="#9bb6cf" text-anchor="middle" font-size="11">{ "code": "ABCD-1234" }</text>

  <rect x="516" y="86" width="180" height="92" rx="10" fill="#0f1f1a" stroke="#22c878"/>
  <text x="606" y="116" fill="#53f39d" text-anchor="middle" font-size="13" font-weight="700">device_token</text>
  <text x="606" y="138" fill="#7fae97" text-anchor="middle" font-size="11">OLLABRIDGE_TOKEN</text>
  <text x="606" y="158" fill="#7fae97" text-anchor="middle" font-size="11">(Bearer for /v1)</text>

  <rect x="756" y="86" width="128" height="92" rx="10" fill="#1a1326" stroke="#8A63D2"/>
  <text x="820" y="120" fill="#c4a9ff" text-anchor="middle" font-size="13" font-weight="700">Router</text>
  <text x="820" y="142" fill="#b9a6d8" text-anchor="middle" font-size="11">/v1/chat</text>
  <text x="820" y="158" fill="#b9a6d8" text-anchor="middle" font-size="11">free-best …</text>

  <line x1="216" y1="132" x2="274" y2="132" stroke="#8A63D2" stroke-width="2" marker-end="url(#pa)"/>
  <line x1="456" y1="132" x2="514" y2="132" stroke="#8A63D2" stroke-width="2" marker-end="url(#pa)"/>
  <line x1="696" y1="132" x2="754" y2="132" stroke="#8A63D2" stroke-width="2" marker-end="url(#pa)"/>

  <text x="36" y="222" fill="#6f6f88" font-size="12">Your token is per-device and temporary — never hard-code it. Pair your own code, export it, and the same env var powers every demo below.</text>
</svg>
