<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 360" font-family="Inter, Segoe UI, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1C1C1F"/><stop offset="1" stop-color="#241a17"/>
    </linearGradient>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#D95C3D"/>
    </marker>
  </defs>
  <rect width="920" height="360" rx="18" fill="url(#bg)"/>
  <text x="40" y="52" fill="#fff" font-size="26" font-weight="700">GitPilot — a team of agents, not a chat box</text>
  <text x="40" y="80" fill="#9a9aa2" font-size="15">You describe the task. Four agents collaborate. You approve every change.</text>

  <!-- You -->
  <rect x="40" y="150" width="120" height="70" rx="12" fill="#D95C3D"/>
  <text x="100" y="182" fill="#fff" font-size="16" font-weight="700" text-anchor="middle">You</text>
  <text x="100" y="202" fill="#fff" font-size="11" text-anchor="middle" opacity="0.85">the request</text>

  <!-- agents -->
  <g>
    <rect x="220" y="120" width="150" height="56" rx="12" fill="#26262b" stroke="#3a3a42"/>
    <text x="295" y="146" fill="#fff" font-size="14" font-weight="600" text-anchor="middle">Explorer</text>
    <text x="295" y="164" fill="#8a8a92" font-size="10.5" text-anchor="middle">reads your repo</text>

    <rect x="220" y="196" width="150" height="56" rx="12" fill="#26262b" stroke="#3a3a42"/>
    <text x="295" y="222" fill="#fff" font-size="14" font-weight="600" text-anchor="middle">Planner</text>
    <text x="295" y="240" fill="#8a8a92" font-size="10.5" text-anchor="middle">drafts a safe plan</text>

    <rect x="430" y="120" width="150" height="56" rx="12" fill="#26262b" stroke="#3a3a42"/>
    <text x="505" y="146" fill="#fff" font-size="14" font-weight="600" text-anchor="middle">Coder</text>
    <text x="505" y="164" fill="#8a8a92" font-size="10.5" text-anchor="middle">writes + runs tests</text>

    <rect x="430" y="196" width="150" height="56" rx="12" fill="#26262b" stroke="#3a3a42"/>
    <text x="505" y="222" fill="#fff" font-size="14" font-weight="600" text-anchor="middle">Reviewer</text>
    <text x="505" y="240" fill="#8a8a92" font-size="10.5" text-anchor="middle">validates + PR</text>
  </g>

  <!-- approval gate -->
  <rect x="640" y="150" width="150" height="70" rx="12" fill="#15301f" stroke="#22c878"/>
  <text x="715" y="180" fill="#22c878" font-size="14" font-weight="700" text-anchor="middle">Your approval</text>
  <text x="715" y="200" fill="#7fd9a8" font-size="10.5" text-anchor="middle">diff before apply</text>

  <!-- result -->
  <rect x="640" y="120" width="150" height="0" fill="none"/>

  <!-- arrows -->
  <line x1="160" y1="185" x2="218" y2="150" stroke="#D95C3D" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="160" y1="185" x2="218" y2="222" stroke="#D95C3D" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="295" y1="176" x2="295" y2="194" stroke="#D95C3D" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="370" y1="148" x2="428" y2="148" stroke="#D95C3D" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="505" y1="176" x2="505" y2="194" stroke="#D95C3D" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="580" y1="185" x2="638" y2="185" stroke="#22c878" stroke-width="2" marker-end="url(#arr)"/>

  <text x="40" y="320" fill="#6f6f78" font-size="12.5">Ask · Auto · Plan modes · Works in VS Code, the web app, and the CLI · Any LLM (OpenAI, Claude, Watsonx, Ollama, OllaBridge)</text>
</svg>
