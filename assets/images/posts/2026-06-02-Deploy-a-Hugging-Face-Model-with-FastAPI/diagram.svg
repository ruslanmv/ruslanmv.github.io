<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 440" font-family="'Hanken Grotesk',system-ui,Arial,sans-serif" role="img" aria-label="FastAPI serving a Hugging Face model: client posts text, FastAPI runs the pipeline, returns JSON">
  <defs>
    <marker id="ah3" markerWidth="12" markerHeight="12" refX="9" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#0b7d4f"/></marker>
    <marker id="ah3b" markerWidth="12" markerHeight="12" refX="9" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#8a978f"/></marker>
    <filter id="sh3" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#10231a" flood-opacity="0.10"/></filter>
    <linearGradient id="hd3" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0f9d63"/><stop offset="1" stop-color="#0b5a3f"/></linearGradient>
  </defs>
  <rect width="1200" height="440" fill="#f8faf8"/>
  <text x="40" y="54" font-size="26" font-weight="800" fill="#152019">Serving a Hugging Face model with FastAPI</text>
  <text x="40" y="84" font-size="16" fill="#5c6b63">One HTTP endpoint wraps the model so any app can call it.</text>

  <!-- client -->
  <g filter="url(#sh3)"><rect x="40" y="160" width="180" height="110" rx="14" fill="#ffffff" stroke="#dfe6e0"/></g>
  <text x="130" y="200" font-size="16" font-weight="700" fill="#152019" text-anchor="middle">Client</text>
  <text x="130" y="226" font-size="13" fill="#46514b" text-anchor="middle">curl · web app</text>
  <text x="130" y="246" font-size="13" fill="#46514b" text-anchor="middle">mobile · service</text>

  <!-- docker container wrapping FastAPI + model -->
  <rect x="430" y="120" width="470" height="210" rx="18" fill="none" stroke="#9ed7bb" stroke-width="2" stroke-dasharray="8 6"/>
  <text x="446" y="146" font-size="13" font-weight="700" fill="#0b7d4f">Docker container</text>

  <g filter="url(#sh3)"><rect x="470" y="160" width="180" height="110" rx="14" fill="#ffffff" stroke="#dfe6e0"/></g>
  <rect x="470" y="160" width="180" height="30" rx="14" fill="url(#hd3)"/><rect x="470" y="176" width="180" height="14" fill="url(#hd3)"/>
  <text x="560" y="180" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">FastAPI + Uvicorn</text>
  <text x="560" y="216" font-size="13" fill="#46514b" text-anchor="middle">POST /classify</text>
  <text x="560" y="236" font-size="13" fill="#46514b" text-anchor="middle">validate (Pydantic)</text>
  <text x="560" y="256" font-size="13" fill="#46514b" text-anchor="middle">GET /health</text>

  <g filter="url(#sh3)"><rect x="700" y="160" width="170" height="110" rx="14" fill="#eaf6ef" stroke="#9ed7bb"/></g>
  <text x="785" y="200" font-size="15" font-weight="700" fill="#0b5a3f" text-anchor="middle">HF pipeline</text>
  <text x="785" y="226" font-size="13" fill="#0b5a3f" text-anchor="middle">model.forward()</text>
  <text x="785" y="246" font-size="13" fill="#0b5a3f" text-anchor="middle">loaded once</text>

  <!-- request / response arrows -->
  <path d="M222 195 L466 195" stroke="#0b7d4f" stroke-width="3" fill="none" marker-end="url(#ah3)"/>
  <text x="300" y="185" font-size="13" fill="#0b5a3f">request: { text }</text>
  <line x1="652" y1="210" x2="696" y2="210" stroke="#0b7d4f" stroke-width="3" marker-end="url(#ah3)"/>

  <path d="M696 250 L560 250" stroke="#8a978f" stroke-width="2.5" stroke-dasharray="5 5" fill="none" marker-end="url(#ah3b)"/>
  <path d="M466 250 L222 250" stroke="#8a978f" stroke-width="2.5" stroke-dasharray="5 5" fill="none" marker-end="url(#ah3b)"/>
  <text x="300" y="270" font-size="13" fill="#8a978f">response: { label, score }</text>

  <!-- cloud target -->
  <g filter="url(#sh3)"><rect x="980" y="160" width="180" height="110" rx="14" fill="#ffffff" stroke="#dfe6e0"/></g>
  <text x="1070" y="196" font-size="15" font-weight="700" fill="#152019" text-anchor="middle">Deploy anywhere</text>
  <text x="1070" y="222" font-size="13" fill="#46514b" text-anchor="middle">Cloud Run · ECS</text>
  <text x="1070" y="242" font-size="13" fill="#46514b" text-anchor="middle">Kubernetes</text>
  <path d="M900 215 L976 215" stroke="#0b7d4f" stroke-width="3" fill="none" marker-end="url(#ah3)"/>
  <text x="912" y="205" font-size="12" fill="#8a978f">docker push</text>
</svg>
