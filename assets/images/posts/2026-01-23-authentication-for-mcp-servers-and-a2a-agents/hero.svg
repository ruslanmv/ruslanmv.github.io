<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 760" width="1600" height="760" role="img" aria-label="Authentication for MCP servers and A2A agents: a Bearer token unlocks a protected endpoint while the public discovery document stays open">
  <defs>
    <linearGradient id="abg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06140e"/><stop offset="0.55" stop-color="#0a2218"/><stop offset="1" stop-color="#04100b"/>
    </linearGradient>
    <radialGradient id="aglow" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#7dffd0"/><stop offset="1" stop-color="#0a7d4f"/></radialGradient>
    <radialGradient id="ahalo" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#2fd987" stop-opacity="0.45"/><stop offset="1" stop-color="#2fd987" stop-opacity="0"/></radialGradient>
  </defs>
  <rect width="1600" height="760" fill="url(#abg)"/>
  <g opacity="0.07" stroke="#7ef0b0"><path d="M0 190 H1600 M0 380 H1600 M0 570 H1600 M400 0 V760 M800 0 V760 M1200 0 V760"/></g>

  <text x="100" y="120" fill="#eaf3ee" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="56" font-weight="800" letter-spacing="-1">Authentication for MCP &amp; A2A</text>
  <text x="100" y="170" fill="#9fcdb7" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="26">Public discovery, protected execution — starting with a Bearer token</text>

  <!-- client -->
  <g transform="translate(220,430)">
    <circle r="120" fill="url(#ahalo)"/>
    <rect x="-86" y="-64" width="172" height="128" rx="14" fill="#0c2a1c" stroke="#2fd987" stroke-width="2"/>
    <text x="0" y="-26" fill="#cdeedd" font-family="Trebuchet MS, sans-serif" font-size="18" text-anchor="middle" font-weight="700">Client / Agent</text>
    <g transform="translate(0,6)">
      <rect x="-66" y="0" width="132" height="34" rx="8" fill="#08190f" stroke="#15613a"/>
      <text x="0" y="23" fill="#7ef0b0" font-family="JetBrains Mono, ui-monospace, monospace" font-size="12.5" text-anchor="middle">Bearer •••••••</text>
    </g>
    <text x="0" y="110" fill="#9fcdb7" font-family="Trebuchet MS, sans-serif" font-size="17" text-anchor="middle">holds the token</text>
  </g>

  <!-- key in flight -->
  <g transform="translate(720,400)">
    <path d="M-180 30 H180" stroke="#2fd987" stroke-width="3" stroke-dasharray="2 10" stroke-linecap="round" opacity="0.7"/>
    <g transform="translate(0,30)">
      <circle r="34" fill="none" stroke="#2fd987" stroke-width="7"/>
      <rect x="20" y="-7" width="58" height="14" rx="4" fill="#2fd987"/>
      <rect x="58" y="-7" width="8" height="22" rx="2" fill="#2fd987"/>
      <rect x="72" y="-7" width="8" height="18" rx="2" fill="#2fd987"/>
    </g>
    <text x="0" y="-12" fill="#7ef0b0" font-family="JetBrains Mono, ui-monospace, monospace" font-size="14" text-anchor="middle">Authorization: Bearer &lt;token&gt;</text>
  </g>

  <!-- server with public + protected -->
  <g transform="translate(1240,430)">
    <circle r="150" fill="url(#ahalo)"/>
    <!-- public card -->
    <g transform="translate(0,-92)">
      <rect x="-150" y="-34" width="300" height="68" rx="12" fill="#0c2a1c" stroke="#5fb0ff" stroke-width="2"/>
      <text x="-126" y="-6" fill="#cfe6ff" font-family="JetBrains Mono, ui-monospace, monospace" font-size="12.5">GET /.well-known/agent-card.json</text>
      <text x="-126" y="18" fill="#8fb6d8" font-family="Trebuchet MS, sans-serif" font-size="13">public · open · no secrets</text>
      <g transform="translate(120,0)"><circle r="15" fill="#1d6fb8"/><path d="M-6 0 a6 6 0 1 1 12 0 v3 h-12 z M-3 -3 v-3 a3 3 0 0 1 6 0 v3" fill="#cfe6ff"/></g>
    </g>
    <!-- protected -->
    <g transform="translate(0,28)">
      <rect x="-150" y="-34" width="300" height="68" rx="12" fill="#0d3322" stroke="#2fd987" stroke-width="2.5"/>
      <text x="-126" y="-6" fill="#cdeedd" font-family="JetBrains Mono, ui-monospace, monospace" font-size="13">POST /mcp · POST /a2a</text>
      <text x="-126" y="18" fill="#9fcdb7" font-family="Trebuchet MS, sans-serif" font-size="13">protected · requires token</text>
      <g transform="translate(120,0)"><circle r="16" fill="url(#aglow)"/><rect x="-7" y="-2" width="14" height="11" rx="2" fill="#06140e"/><path d="M-4 -2 v-4 a4 4 0 0 1 8 0 v4" fill="none" stroke="#06140e" stroke-width="2.6"/></g>
    </g>
    <text x="0" y="138" fill="#9fcdb7" font-family="Trebuchet MS, sans-serif" font-size="17" text-anchor="middle">MCP server / A2A agent</text>
  </g>

  <!-- status chips -->
  <g font-family="JetBrains Mono, ui-monospace, monospace" font-size="14">
    <g transform="translate(640,610)"><rect width="120" height="34" rx="8" fill="#10241a" stroke="#15613a"/><text x="60" y="22" fill="#7ef0b0" text-anchor="middle">200 OK</text></g>
    <g transform="translate(780,610)"><rect width="120" height="34" rx="8" fill="#2a230c" stroke="#9a7b1f"/><text x="60" y="22" fill="#ffe6a8" text-anchor="middle">401 no token</text></g>
    <g transform="translate(920,610)"><rect width="140" height="34" rx="8" fill="#26100f" stroke="#9a2f27"/><text x="70" y="22" fill="#ff9b9b" text-anchor="middle">403 bad token</text></g>
  </g>
</svg>
