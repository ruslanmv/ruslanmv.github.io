<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" font-family="'Segoe UI',system-ui,sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="-10%" r="120%"><stop offset="0%" stop-color="#101a3a"/><stop offset="55%" stop-color="#0a0c1e"/><stop offset="100%" stop-color="#06060f"/></radialGradient>
    <filter id="g" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <linearGradient id="scan" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#000" stop-opacity="0"/><stop offset="100%" stop-color="#000" stop-opacity="0.3"/></linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- neon platforms + hero + enemy -->
  <g filter="url(#g)">
    <rect x="120" y="470" width="120" height="20" rx="10" fill="#00f0ff"/>
    <rect x="210" y="360" width="120" height="20" rx="10" fill="#21e600"/>
    <rect x="120" y="250" width="120" height="20" rx="10" fill="#ffb000"/>
    <!-- hero -->
    <circle cx="180" cy="225" r="22" fill="#39ff14"/><circle cx="174" cy="222" r="4" fill="#04210a"/><circle cx="188" cy="222" r="4" fill="#04210a"/>
    <!-- enemy -->
    <circle cx="980" cy="300" r="22" fill="#ff2d55"/><circle cx="974" cy="297" r="4" fill="#fff"/><circle cx="988" cy="297" r="4" fill="#fff"/>
    <!-- coin + star -->
    <circle cx="1000" cy="470" r="14" fill="#ffd400"/>
    <polygon points="1000,150 1010,182 1044,182 1017,202 1027,234 1000,214 973,234 983,202 956,182 990,182" fill="#ff00d4"/>
  </g>

  <text x="600" y="250" text-anchor="middle" fill="#39ff14" font-size="64" font-weight="800" letter-spacing="3" filter="url(#g)">NEON CLIMBER</text>
  <text x="600" y="296" text-anchor="middle" fill="#00f0ff" font-size="25" font-weight="700" letter-spacing="9">UNDER CONTRACT</text>

  <text x="600" y="372" text-anchor="middle" fill="#b9b9e6" font-size="20" letter-spacing="1">
    built in <tspan fill="#ffd400" font-weight="700">6 governed batches</tspan> by <tspan fill="#10a37f" font-weight="700">gpt-oss-120b</tspan> on <tspan fill="#5b8def" font-weight="700">IBM watsonx</tspan>
  </text>
  <text x="600" y="404" text-anchor="middle" fill="#8b8bb0" font-size="17" letter-spacing="3">GitPilot × Matrix Builder · an open model, under contract</text>

  <g transform="translate(600,470)">
    <rect x="-250" y="-20" width="500" height="34" rx="17" fill="#0a1a0a" stroke="#21e600" stroke-opacity="0.6"/>
    <text x="0" y="4" text-anchor="middle" fill="#21e600" font-size="15" letter-spacing="2">6 × MATRIX_STATUS: approved · score 100 · 0 out-of-scope edits</text>
  </g>
  <rect width="1200" height="630" fill="url(#scan)" opacity="0.5"/>
</svg>
