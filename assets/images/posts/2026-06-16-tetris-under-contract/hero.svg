<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" font-family="'Segoe UI',system-ui,sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="-10%" r="120%">
      <stop offset="0%" stop-color="#1b1b3a"/><stop offset="55%" stop-color="#0c0b1c"/><stop offset="100%" stop-color="#07060f"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="scan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000" stop-opacity="0"/><stop offset="100%" stop-color="#000" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- scattered neon tetrominoes -->
  <g filter="url(#glow)">
    <!-- I cyan -->
    <g fill="#00f0ff"><rect x="120" y="150" width="40" height="40" rx="5"/><rect x="160" y="150" width="40" height="40" rx="5"/><rect x="200" y="150" width="40" height="40" rx="5"/><rect x="240" y="150" width="40" height="40" rx="5"/></g>
    <!-- O yellow -->
    <g fill="#ffd400"><rect x="980" y="120" width="40" height="40" rx="5"/><rect x="1020" y="120" width="40" height="40" rx="5"/><rect x="980" y="160" width="40" height="40" rx="5"/><rect x="1020" y="160" width="40" height="40" rx="5"/></g>
    <!-- T purple -->
    <g fill="#b026ff"><rect x="150" y="430" width="40" height="40" rx="5"/><rect x="190" y="430" width="40" height="40" rx="5"/><rect x="230" y="430" width="40" height="40" rx="5"/><rect x="190" y="470" width="40" height="40" rx="5"/></g>
    <!-- L orange -->
    <g fill="#ff9000"><rect x="980" y="430" width="40" height="40" rx="5"/><rect x="980" y="470" width="40" height="40" rx="5"/><rect x="1020" y="470" width="40" height="40" rx="5"/><rect x="1060" y="470" width="40" height="40" rx="5"/></g>
    <!-- S green -->
    <g fill="#21e600"><rect x="120" y="300" width="40" height="40" rx="5"/><rect x="160" y="300" width="40" height="40" rx="5"/><rect x="80" y="340" width="40" height="40" rx="5"/><rect x="120" y="340" width="40" height="40" rx="5"/></g>
    <!-- Z red -->
    <g fill="#ff2d2d"><rect x="1020" y="290" width="40" height="40" rx="5"/><rect x="1060" y="290" width="40" height="40" rx="5"/><rect x="1060" y="330" width="40" height="40" rx="5"/><rect x="1100" y="330" width="40" height="40" rx="5"/></g>
  </g>

  <text x="600" y="270" text-anchor="middle" fill="#00f0ff" font-size="74" font-weight="800" letter-spacing="8" filter="url(#glow)">NEON TETRIS</text>
  <text x="600" y="318" text-anchor="middle" fill="#ff00d4" font-size="26" font-weight="700" letter-spacing="10">UNDER CONTRACT</text>

  <text x="600" y="392" text-anchor="middle" fill="#b9b9e6" font-size="21" letter-spacing="2">
    built in <tspan fill="#ffd400" font-weight="700">5 governed batches</tspan> by
    <tspan fill="#8A63D2" font-weight="700"> Claude Opus 4.8</tspan>
  </text>
  <text x="600" y="424" text-anchor="middle" fill="#8b8bb0" font-size="18" letter-spacing="3">GitPilot × Matrix Builder · every batch validated before commit</text>

  <g transform="translate(600,560)">
    <rect x="-235" y="-20" width="470" height="34" rx="17" fill="#0a1a0a" stroke="#21e600" stroke-opacity="0.6"/>
    <text x="0" y="4" text-anchor="middle" fill="#21e600" font-size="16" letter-spacing="2">5 × MATRIX_STATUS: approved · score 100 · 0 out-of-scope edits</text>
  </g>
  <rect width="1200" height="630" fill="url(#scan)" opacity="0.5"/>
</svg>
