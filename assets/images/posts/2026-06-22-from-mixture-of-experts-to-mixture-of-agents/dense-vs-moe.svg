<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 360" role="img" aria-label="Dense feed-forward layer versus a Mixture of Experts: every token activates every parameter on the left; only top-k experts on the right.">
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#07111f"/><stop offset="1" stop-color="#081426"/>
    </linearGradient>
    <linearGradient id="hot" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#facc15"/><stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="cool" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#1e3a5f"/><stop offset="1" stop-color="#0f2540"/>
    </linearGradient>
  </defs>
  <rect width="880" height="360" rx="18" fill="url(#bg)" stroke="#1f3654"/>
  <!-- LEFT: Dense -->
  <text x="160" y="34" fill="#e6f2ff" font-family="Inter,system-ui,sans-serif" font-weight="800" font-size="16" text-anchor="middle">Dense feed-forward</text>
  <text x="160" y="54" fill="#8aa4c2" font-family="Inter,system-ui,sans-serif" font-size="12" text-anchor="middle">every token activates every parameter</text>
  <!-- token -->
  <circle cx="60" cy="190" r="14" fill="#34d399"/>
  <text x="60" y="194" fill="#06121f" font-family="ui-monospace,monospace" font-size="11" text-anchor="middle" font-weight="800">x</text>
  <!-- Dense block: solid slab of "all-on" cells -->
  <rect x="100" y="100" width="190" height="180" rx="14" fill="url(#hot)" opacity="0.92" stroke="#fde68a"/>
  <g opacity="0.55" stroke="#92400e" stroke-width="1">
    <line x1="100" y1="135" x2="290" y2="135"/><line x1="100" y1="170" x2="290" y2="170"/>
    <line x1="100" y1="205" x2="290" y2="205"/><line x1="100" y1="240" x2="290" y2="240"/>
    <line x1="150" y1="100" x2="150" y2="280"/><line x1="200" y1="100" x2="200" y2="280"/><line x1="250" y1="100" x2="250" y2="280"/>
  </g>
  <text x="195" y="195" fill="#06121f" font-family="Inter,system-ui,sans-serif" font-weight="800" font-size="14" text-anchor="middle">FFN (all of it, every time)</text>
  <!-- output -->
  <line x1="290" y1="190" x2="320" y2="190" stroke="#facc15" stroke-width="3"/>
  <polygon points="320,184 332,190 320,196" fill="#facc15"/>
  <text x="358" y="194" fill="#facc15" font-family="ui-monospace,monospace" font-size="12" font-weight="800">100% FLOPs</text>

  <!-- divider -->
  <line x1="448" y1="60" x2="448" y2="320" stroke="#1f3654" stroke-dasharray="3 5"/>

  <!-- RIGHT: MoE -->
  <text x="668" y="34" fill="#e6f2ff" font-family="Inter,system-ui,sans-serif" font-weight="800" font-size="16" text-anchor="middle">Mixture of Experts (top-k = 2)</text>
  <text x="668" y="54" fill="#8aa4c2" font-family="Inter,system-ui,sans-serif" font-size="12" text-anchor="middle">total capacity = N experts · cost per token ≈ k</text>
  <!-- token -->
  <circle cx="468" cy="190" r="14" fill="#34d399"/>
  <text x="468" y="194" fill="#06121f" font-family="ui-monospace,monospace" font-size="11" text-anchor="middle" font-weight="800">x</text>
  <!-- Gate -->
  <rect x="500" y="160" width="80" height="60" rx="12" fill="#0b2238" stroke="#7dd3fc"/>
  <text x="540" y="184" fill="#e6f2ff" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="800" text-anchor="middle">gate</text>
  <text x="540" y="204" fill="#7dd3fc" font-family="ui-monospace,monospace" font-size="10" text-anchor="middle">top-k</text>
  <line x1="482" y1="190" x2="500" y2="190" stroke="#34d399" stroke-width="2"/>
  <!-- experts (6 small, 2 active) -->
  <g>
    <!-- inactive experts -->
    <rect x="610" y="95" width="74" height="44" rx="10" fill="url(#cool)" stroke="#31557f"/>
    <text x="647" y="122" fill="#94a3b8" font-family="Inter,system-ui,sans-serif" font-weight="700" font-size="12" text-anchor="middle">E1</text>
    <rect x="610" y="145" width="74" height="44" rx="10" fill="url(#hot)" stroke="#fde68a"/>
    <text x="647" y="172" fill="#06121f" font-family="Inter,system-ui,sans-serif" font-weight="800" font-size="12" text-anchor="middle">E2 • on</text>
    <rect x="610" y="195" width="74" height="44" rx="10" fill="url(#cool)" stroke="#31557f"/>
    <text x="647" y="222" fill="#94a3b8" font-family="Inter,system-ui,sans-serif" font-weight="700" font-size="12" text-anchor="middle">E3</text>
    <rect x="610" y="245" width="74" height="44" rx="10" fill="url(#hot)" stroke="#fde68a"/>
    <text x="647" y="272" fill="#06121f" font-family="Inter,system-ui,sans-serif" font-weight="800" font-size="12" text-anchor="middle">E4 • on</text>
    <rect x="700" y="120" width="74" height="44" rx="10" fill="url(#cool)" stroke="#31557f"/>
    <text x="737" y="147" fill="#94a3b8" font-family="Inter,system-ui,sans-serif" font-weight="700" font-size="12" text-anchor="middle">E5</text>
    <rect x="700" y="220" width="74" height="44" rx="10" fill="url(#cool)" stroke="#31557f"/>
    <text x="737" y="247" fill="#94a3b8" font-family="Inter,system-ui,sans-serif" font-weight="700" font-size="12" text-anchor="middle">E6</text>
  </g>
  <!-- routes -->
  <g stroke-width="1" stroke="#31557f">
    <line x1="580" y1="190" x2="610" y2="117"/>
    <line x1="580" y1="190" x2="610" y2="217"/>
    <line x1="580" y1="190" x2="700" y2="142"/>
    <line x1="580" y1="190" x2="700" y2="242"/>
  </g>
  <g stroke-width="3" stroke="#facc15">
    <line x1="580" y1="190" x2="610" y2="167"/>
    <line x1="580" y1="190" x2="610" y2="267"/>
  </g>
  <!-- output -->
  <line x1="775" y1="190" x2="805" y2="190" stroke="#facc15" stroke-width="3"/>
  <polygon points="805,184 817,190 805,196" fill="#facc15"/>
  <text x="838" y="194" fill="#facc15" font-family="ui-monospace,monospace" font-size="12" font-weight="800" text-anchor="middle">2/6</text>

  <!-- bottom callouts -->
  <text x="195" y="320" fill="#fda4af" font-family="Inter,system-ui,sans-serif" font-size="12" text-anchor="middle">total = active = every parameter, every token</text>
  <text x="668" y="320" fill="#86efac" font-family="Inter,system-ui,sans-serif" font-size="12" text-anchor="middle">total ≫ active — capacity and compute decoupled</text>
</svg>
