<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 320" role="img" aria-label="Expert collapse versus balanced routing: a few experts get hammered while most sit idle, versus traffic spread evenly across the bench.">
  <defs>
    <linearGradient id="bg3" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#07111f"/><stop offset="1" stop-color="#081426"/>
    </linearGradient>
    <linearGradient id="hotbar" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#fb7185"/><stop offset="1" stop-color="#b91c1c"/>
    </linearGradient>
    <linearGradient id="goodbar" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#34d399"/><stop offset="1" stop-color="#059669"/>
    </linearGradient>
  </defs>
  <rect width="880" height="320" rx="18" fill="url(#bg3)" stroke="#1f3654"/>

  <!-- LEFT: collapse -->
  <text x="220" y="34" fill="#fda4af" font-family="Inter,system-ui,sans-serif" font-weight="800" font-size="16" text-anchor="middle">Expert collapse</text>
  <text x="220" y="54" fill="#8aa4c2" font-family="Inter,system-ui,sans-serif" font-size="12" text-anchor="middle">a few specialists handle everything; the rest decay</text>
  <!-- bars -->
  <g>
    <!-- baseline -->
    <line x1="60" y1="250" x2="380" y2="250" stroke="#1f3654"/>
    <!-- 8 bars, heavily skewed -->
    <g>
      <rect x="70"  y="100" width="28" height="150" rx="4" fill="url(#hotbar)"/>
      <rect x="110" y="120" width="28" height="130" rx="4" fill="url(#hotbar)"/>
      <rect x="150" y="225" width="28" height="25"  rx="4" fill="#243a59"/>
      <rect x="190" y="232" width="28" height="18"  rx="4" fill="#243a59"/>
      <rect x="230" y="240" width="28" height="10"  rx="4" fill="#243a59"/>
      <rect x="270" y="242" width="28" height="8"   rx="4" fill="#243a59"/>
      <rect x="310" y="246" width="28" height="4"   rx="4" fill="#243a59"/>
      <rect x="350" y="248" width="28" height="2"   rx="4" fill="#243a59"/>
    </g>
    <text x="84"  y="270" fill="#fda4af" font-family="ui-monospace,monospace" font-size="10" text-anchor="middle">E1</text>
    <text x="124" y="270" fill="#fda4af" font-family="ui-monospace,monospace" font-size="10" text-anchor="middle">E2</text>
    <text x="164" y="270" fill="#94a3b8" font-family="ui-monospace,monospace" font-size="10" text-anchor="middle">E3</text>
    <text x="204" y="270" fill="#94a3b8" font-family="ui-monospace,monospace" font-size="10" text-anchor="middle">E4</text>
    <text x="244" y="270" fill="#94a3b8" font-family="ui-monospace,monospace" font-size="10" text-anchor="middle">E5</text>
    <text x="284" y="270" fill="#94a3b8" font-family="ui-monospace,monospace" font-size="10" text-anchor="middle">E6</text>
    <text x="324" y="270" fill="#94a3b8" font-family="ui-monospace,monospace" font-size="10" text-anchor="middle">E7</text>
    <text x="364" y="270" fill="#94a3b8" font-family="ui-monospace,monospace" font-size="10" text-anchor="middle">E8</text>
    <!-- annotation -->
    <text x="220" y="295" fill="#94a3b8" font-family="Inter,system-ui,sans-serif" font-size="11" text-anchor="middle">capacity paid for · never used</text>
  </g>

  <!-- divider -->
  <line x1="448" y1="40" x2="448" y2="290" stroke="#1f3654" stroke-dasharray="3 5"/>

  <!-- RIGHT: balanced -->
  <text x="660" y="34" fill="#86efac" font-family="Inter,system-ui,sans-serif" font-weight="800" font-size="16" text-anchor="middle">Balanced routing</text>
  <text x="660" y="54" fill="#8aa4c2" font-family="Inter,system-ui,sans-serif" font-size="12" text-anchor="middle">load-balance loss + noisy top-k — every expert earns its keep</text>
  <g>
    <line x1="500" y1="250" x2="820" y2="250" stroke="#1f3654"/>
    <g>
      <rect x="510" y="160" width="28" height="90" rx="4" fill="url(#goodbar)"/>
      <rect x="550" y="150" width="28" height="100" rx="4" fill="url(#goodbar)"/>
      <rect x="590" y="170" width="28" height="80"  rx="4" fill="url(#goodbar)"/>
      <rect x="630" y="155" width="28" height="95"  rx="4" fill="url(#goodbar)"/>
      <rect x="670" y="165" width="28" height="85"  rx="4" fill="url(#goodbar)"/>
      <rect x="710" y="158" width="28" height="92"  rx="4" fill="url(#goodbar)"/>
      <rect x="750" y="170" width="28" height="80"  rx="4" fill="url(#goodbar)"/>
      <rect x="790" y="162" width="28" height="88"  rx="4" fill="url(#goodbar)"/>
    </g>
    <text x="524" y="270" fill="#86efac" font-family="ui-monospace,monospace" font-size="10" text-anchor="middle">E1</text>
    <text x="564" y="270" fill="#86efac" font-family="ui-monospace,monospace" font-size="10" text-anchor="middle">E2</text>
    <text x="604" y="270" fill="#86efac" font-family="ui-monospace,monospace" font-size="10" text-anchor="middle">E3</text>
    <text x="644" y="270" fill="#86efac" font-family="ui-monospace,monospace" font-size="10" text-anchor="middle">E4</text>
    <text x="684" y="270" fill="#86efac" font-family="ui-monospace,monospace" font-size="10" text-anchor="middle">E5</text>
    <text x="724" y="270" fill="#86efac" font-family="ui-monospace,monospace" font-size="10" text-anchor="middle">E6</text>
    <text x="764" y="270" fill="#86efac" font-family="ui-monospace,monospace" font-size="10" text-anchor="middle">E7</text>
    <text x="804" y="270" fill="#86efac" font-family="ui-monospace,monospace" font-size="10" text-anchor="middle">E8</text>
    <text x="660" y="295" fill="#94a3b8" font-family="Inter,system-ui,sans-serif" font-size="11" text-anchor="middle">capacity paid for · capacity used</text>
  </g>

  <!-- left side axis label -->
  <g>
    <text x="44" y="120" fill="#475569" font-family="ui-monospace,monospace" font-size="10" transform="rotate(-90 44,120)">tokens routed →</text>
  </g>
</svg>
