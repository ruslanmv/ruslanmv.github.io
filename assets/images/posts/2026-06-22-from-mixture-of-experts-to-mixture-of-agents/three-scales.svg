<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 360" role="img" aria-label="One sparse-routing pattern at three scales: token-level MoE, model-level router across LLM backends, and agent-level orchestrator across autonomous agents.">
  <defs>
    <linearGradient id="bg2" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#07111f"/><stop offset="1" stop-color="#081426"/>
    </linearGradient>
    <linearGradient id="card" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#0e2440"/><stop offset="1" stop-color="#0a1a30"/>
    </linearGradient>
    <linearGradient id="active" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#facc15"/><stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  <rect width="940" height="360" rx="18" fill="url(#bg2)" stroke="#1f3654"/>

  <text x="470" y="32" fill="#e6f2ff" font-family="Inter,system-ui,sans-serif" font-weight="800" font-size="17" text-anchor="middle">One idea, three sizes — same gate, larger experts</text>
  <text x="470" y="52" fill="#8aa4c2" font-family="Inter,system-ui,sans-serif" font-size="12" text-anchor="middle">sparse routing over a population of specialists</text>

  <!-- 3 panels -->
  <g>
    <!-- Panel 1: TOKEN -->
    <rect x="30" y="80" width="280" height="240" rx="16" fill="url(#card)" stroke="#1f3654"/>
    <text x="170" y="106" fill="#7dd3fc" font-family="ui-monospace,monospace" font-size="11" text-anchor="middle" font-weight="800">SCALE 1 • TOKEN</text>
    <text x="170" y="126" fill="#e6f2ff" font-family="Inter,system-ui,sans-serif" font-size="14" text-anchor="middle" font-weight="700">Mixture of Experts</text>
    <circle cx="70" cy="220" r="11" fill="#34d399"/>
    <text x="70" y="224" fill="#06121f" font-family="ui-monospace,monospace" font-size="9" text-anchor="middle" font-weight="800">tok</text>
    <rect x="100" y="200" width="56" height="40" rx="10" fill="#0b2238" stroke="#7dd3fc"/>
    <text x="128" y="225" fill="#e6f2ff" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="800" text-anchor="middle">gate</text>
    <line x1="81" y1="220" x2="100" y2="220" stroke="#34d399" stroke-width="2"/>
    <!-- experts (sub-networks) -->
    <g>
      <rect x="180" y="170" width="48" height="28" rx="7" fill="#0a1a30" stroke="#31557f"/><text x="204" y="188" fill="#94a3b8" font-family="Inter,system-ui,sans-serif" font-size="10" text-anchor="middle">E1</text>
      <rect x="180" y="206" width="48" height="28" rx="7" fill="url(#active)" stroke="#fde68a"/><text x="204" y="224" fill="#06121f" font-family="Inter,system-ui,sans-serif" font-size="10" text-anchor="middle" font-weight="800">E2</text>
      <rect x="180" y="242" width="48" height="28" rx="7" fill="#0a1a30" stroke="#31557f"/><text x="204" y="260" fill="#94a3b8" font-family="Inter,system-ui,sans-serif" font-size="10" text-anchor="middle">E3</text>
      <rect x="240" y="170" width="48" height="28" rx="7" fill="#0a1a30" stroke="#31557f"/><text x="264" y="188" fill="#94a3b8" font-family="Inter,system-ui,sans-serif" font-size="10" text-anchor="middle">E4</text>
      <rect x="240" y="206" width="48" height="28" rx="7" fill="url(#active)" stroke="#fde68a"/><text x="264" y="224" fill="#06121f" font-family="Inter,system-ui,sans-serif" font-size="10" text-anchor="middle" font-weight="800">E5</text>
      <rect x="240" y="242" width="48" height="28" rx="7" fill="#0a1a30" stroke="#31557f"/><text x="264" y="260" fill="#94a3b8" font-family="Inter,system-ui,sans-serif" font-size="10" text-anchor="middle">E6</text>
    </g>
    <g stroke="#facc15" stroke-width="2">
      <line x1="156" y1="220" x2="180" y2="220"/>
      <line x1="156" y1="220" x2="240" y2="220"/>
    </g>
    <text x="170" y="298" fill="#8aa4c2" font-family="Inter,system-ui,sans-serif" font-size="11" text-anchor="middle">experts = sub-networks</text>
  </g>

  <g>
    <!-- Panel 2: MODEL -->
    <rect x="330" y="80" width="280" height="240" rx="16" fill="url(#card)" stroke="#1f3654"/>
    <text x="470" y="106" fill="#7dd3fc" font-family="ui-monospace,monospace" font-size="11" text-anchor="middle" font-weight="800">SCALE 2 • MODEL</text>
    <text x="470" y="126" fill="#e6f2ff" font-family="Inter,system-ui,sans-serif" font-size="14" text-anchor="middle" font-weight="700">Router across LLM backends</text>
    <circle cx="370" cy="220" r="11" fill="#34d399"/>
    <text x="370" y="224" fill="#06121f" font-family="ui-monospace,monospace" font-size="9" text-anchor="middle" font-weight="800">req</text>
    <rect x="400" y="200" width="68" height="40" rx="10" fill="#0b2238" stroke="#7dd3fc"/>
    <text x="434" y="225" fill="#e6f2ff" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="800" text-anchor="middle">gateway</text>
    <line x1="381" y1="220" x2="400" y2="220" stroke="#34d399" stroke-width="2"/>
    <!-- model boxes (whole models) -->
    <g>
      <rect x="490" y="158" width="100" height="34" rx="8" fill="#0a1a30" stroke="#31557f"/><text x="540" y="180" fill="#94a3b8" font-family="Inter,system-ui,sans-serif" font-size="11" text-anchor="middle">local 7B</text>
      <rect x="490" y="198" width="100" height="34" rx="8" fill="url(#active)" stroke="#fde68a"/><text x="540" y="220" fill="#06121f" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="800" text-anchor="middle">frontier API</text>
      <rect x="490" y="238" width="100" height="34" rx="8" fill="#0a1a30" stroke="#31557f"/><text x="540" y="260" fill="#94a3b8" font-family="Inter,system-ui,sans-serif" font-size="11" text-anchor="middle">domain LLM</text>
    </g>
    <g stroke-width="2">
      <line x1="468" y1="220" x2="490" y2="175" stroke="#31557f"/>
      <line x1="468" y1="220" x2="490" y2="215" stroke="#facc15"/>
      <line x1="468" y1="220" x2="490" y2="255" stroke="#31557f"/>
    </g>
    <text x="470" y="298" fill="#8aa4c2" font-family="Inter,system-ui,sans-serif" font-size="11" text-anchor="middle">experts = whole models</text>
  </g>

  <g>
    <!-- Panel 3: AGENT -->
    <rect x="630" y="80" width="280" height="240" rx="16" fill="url(#card)" stroke="#1f3654"/>
    <text x="770" y="106" fill="#7dd3fc" font-family="ui-monospace,monospace" font-size="11" text-anchor="middle" font-weight="800">SCALE 3 • AGENT</text>
    <text x="770" y="126" fill="#e6f2ff" font-family="Inter,system-ui,sans-serif" font-size="14" text-anchor="middle" font-weight="700">Agent orchestrator</text>
    <circle cx="670" cy="220" r="11" fill="#34d399"/>
    <text x="670" y="224" fill="#06121f" font-family="ui-monospace,monospace" font-size="9" text-anchor="middle" font-weight="800">task</text>
    <rect x="700" y="200" width="68" height="40" rx="10" fill="#0b2238" stroke="#7dd3fc"/>
    <text x="734" y="225" fill="#e6f2ff" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="800" text-anchor="middle">orchestrator</text>
    <line x1="681" y1="220" x2="700" y2="220" stroke="#34d399" stroke-width="2"/>
    <g>
      <rect x="790" y="158" width="100" height="34" rx="8" fill="#0a1a30" stroke="#31557f"/><text x="840" y="180" fill="#94a3b8" font-family="Inter,system-ui,sans-serif" font-size="11" text-anchor="middle">researcher</text>
      <rect x="790" y="198" width="100" height="34" rx="8" fill="url(#active)" stroke="#fde68a"/><text x="840" y="220" fill="#06121f" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="800" text-anchor="middle">coder</text>
      <rect x="790" y="238" width="100" height="34" rx="8" fill="#0a1a30" stroke="#31557f"/><text x="840" y="260" fill="#94a3b8" font-family="Inter,system-ui,sans-serif" font-size="11" text-anchor="middle">reviewer</text>
    </g>
    <g stroke-width="2">
      <line x1="768" y1="220" x2="790" y2="175" stroke="#31557f"/>
      <line x1="768" y1="220" x2="790" y2="215" stroke="#facc15"/>
      <line x1="768" y1="220" x2="790" y2="255" stroke="#31557f"/>
    </g>
    <text x="770" y="298" fill="#8aa4c2" font-family="Inter,system-ui,sans-serif" font-size="11" text-anchor="middle">experts = autonomous agents</text>
  </g>

  <!-- baseline arrow -->
  <g>
    <line x1="60" y1="345" x2="880" y2="345" stroke="#1f3654" stroke-dasharray="4 5"/>
    <text x="60" y="340" fill="#7dd3fc" font-family="ui-monospace,monospace" font-size="11">narrower</text>
    <text x="880" y="340" fill="#7dd3fc" font-family="ui-monospace,monospace" font-size="11" text-anchor="end">broader</text>
  </g>
</svg>
