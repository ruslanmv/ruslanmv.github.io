<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 470" font-family="'Hanken Grotesk',system-ui,Arial,sans-serif" role="img" aria-label="From laptop to production: build the image, ship it to a registry, run it locally or in the cloud">
  <defs>
    <marker id="ahd" markerWidth="12" markerHeight="12" refX="9" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#0b7d4f"/></marker>
    <filter id="shd" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#10231a" flood-opacity="0.10"/></filter>
    <linearGradient id="hdd" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0f9d63"/><stop offset="1" stop-color="#0b5a3f"/></linearGradient>
  </defs>
  <rect width="1200" height="470" fill="#f8faf8"/>
  <text x="40" y="52" font-size="26" font-weight="800" fill="#152019">From laptop to production: build, ship, run</text>
  <text x="40" y="82" font-size="16" fill="#5c6b63">The same container image runs identically in development and in the cloud.</text>

  <!-- stage labels -->
  <text x="150" y="124" font-size="13" font-weight="800" letter-spacing="1" fill="#0b7d4f" text-anchor="middle">BUILD</text>
  <text x="600" y="124" font-size="13" font-weight="800" letter-spacing="1" fill="#0b7d4f" text-anchor="middle">SHIP</text>
  <text x="1010" y="124" font-size="13" font-weight="800" letter-spacing="1" fill="#0b7d4f" text-anchor="middle">RUN</text>

  <!-- source -->
  <g filter="url(#shd)"><rect x="40" y="140" width="220" height="120" rx="14" fill="#ffffff" stroke="#dfe6e0"/></g>
  <text x="150" y="172" font-size="15" font-weight="700" fill="#152019" text-anchor="middle">Your project</text>
  <text x="150" y="198" font-size="13" fill="#46514b" text-anchor="middle" font-family="monospace">app.py</text>
  <text x="150" y="218" font-size="13" fill="#46514b" text-anchor="middle" font-family="monospace">requirements.txt</text>
  <text x="150" y="238" font-size="13" fill="#46514b" text-anchor="middle" font-family="monospace">Dockerfile</text>

  <!-- image -->
  <g filter="url(#shd)"><rect x="340" y="140" width="200" height="120" rx="14" fill="#ffffff" stroke="#dfe6e0"/></g>
  <rect x="340" y="140" width="200" height="30" rx="14" fill="url(#hdd)"/><rect x="340" y="156" width="200" height="14" fill="url(#hdd)"/>
  <text x="440" y="160" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">Docker image</text>
  <text x="440" y="196" font-size="13" fill="#46514b" text-anchor="middle">multi-stage · slim</text>
  <text x="440" y="216" font-size="13" fill="#46514b" text-anchor="middle">non-root user</text>
  <text x="440" y="236" font-size="13" fill="#46514b" text-anchor="middle">health check</text>

  <!-- registry -->
  <g filter="url(#shd)"><rect x="620" y="140" width="180" height="120" rx="14" fill="#ffffff" stroke="#dfe6e0"/></g>
  <text x="710" y="180" font-size="15" font-weight="700" fill="#152019" text-anchor="middle">Registry</text>
  <text x="710" y="206" font-size="13" fill="#46514b" text-anchor="middle">Docker Hub ·</text>
  <text x="710" y="224" font-size="13" fill="#46514b" text-anchor="middle">GHCR · ECR</text>

  <!-- run targets -->
  <g filter="url(#shd)"><rect x="880" y="140" width="280" height="120" rx="14" fill="#eaf6ef" stroke="#9ed7bb"/></g>
  <text x="1020" y="172" font-size="15" font-weight="700" fill="#0b5a3f" text-anchor="middle">Run anywhere</text>
  <text x="1020" y="198" font-size="13" fill="#0b5a3f" text-anchor="middle">docker run · docker compose</text>
  <text x="1020" y="220" font-size="13" fill="#0b5a3f" text-anchor="middle">Cloud Run · ECS Fargate</text>
  <text x="1020" y="240" font-size="13" fill="#0b5a3f" text-anchor="middle">Kubernetes</text>

  <g stroke="#0b7d4f" stroke-width="3" marker-end="url(#ahd)" fill="none">
    <line x1="262" y1="200" x2="336" y2="200"/>
    <line x1="540" y1="200" x2="616" y2="200"/>
    <line x1="800" y1="200" x2="876" y2="200"/>
  </g>
  <text x="300" y="190" font-size="12" fill="#8a978f">build</text>
  <text x="565" y="190" font-size="12" fill="#8a978f">push</text>
  <text x="828" y="190" font-size="12" fill="#8a978f">deploy</text>

  <!-- inner request flow -->
  <g filter="url(#shd)"><rect x="340" y="320" width="820" height="110" rx="16" fill="#ffffff" stroke="#dfe6e0"/></g>
  <text x="360" y="348" font-size="13" font-weight="800" fill="#0b7d4f">INSIDE THE CONTAINER</text>
  <g font-size="14" font-weight="700" fill="#152019" text-anchor="middle">
    <text x="430" y="392">Client</text><text x="650" y="392">FastAPI</text><text x="880" y="392">ReAct agent</text><text x="1090" y="392">OpenAI</text>
  </g>
  <g stroke="#0b7d4f" stroke-width="2.5" marker-end="url(#ahd)" fill="none">
    <line x1="470" y1="388" x2="600" y2="388"/>
    <line x1="710" y1="388" x2="820" y2="388"/>
    <line x1="950" y1="388" x2="1040" y2="388"/>
  </g>
  <text x="535" y="378" font-size="12" fill="#8a978f">POST /classify</text>
  <text x="755" y="378" font-size="12" fill="#8a978f">tool: scan_url</text>
  <path d="M440 260 L440 318" stroke="#9ed7bb" stroke-width="2.5" stroke-dasharray="6 5" fill="none" marker-end="url(#ahd)"/>
</svg>
