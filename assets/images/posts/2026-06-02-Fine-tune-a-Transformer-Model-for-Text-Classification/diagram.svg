<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 470" font-family="'Hanken Grotesk',system-ui,Arial,sans-serif" role="img" aria-label="Text classification pipeline: dataset, tokenizer, DistilBERT, classification head, Trainer, evaluation, saved model, inference">
  <defs>
    <marker id="act" markerWidth="12" markerHeight="12" refX="9" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#0b7d4f"/></marker>
    <filter id="sct" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#10231a" flood-opacity="0.10"/></filter>
    <linearGradient id="hct" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0f9d63"/><stop offset="1" stop-color="#0b5a3f"/></linearGradient>
  </defs>
  <rect width="1200" height="470" fill="#f8faf8"/>
  <text x="40" y="52" font-size="26" font-weight="800" fill="#152019">Fine-tuning a transformer for text classification</text>
  <text x="40" y="82" font-size="16" fill="#5c6b63">The tokenizer turns text into numbers; the model learns to map them to your labels.</text>

  <!-- TRAIN row -->
  <text x="40" y="124" font-size="12" font-weight="800" letter-spacing="1" fill="#0b7d4f">TRAIN</text>
  <g filter="url(#sct)">
    <rect x="40"  y="138" width="150" height="84" rx="13" fill="#ffffff" stroke="#dfe6e0"/>
    <rect x="240" y="138" width="150" height="84" rx="13" fill="#ffffff" stroke="#dfe6e0"/>
    <rect x="440" y="138" width="200" height="84" rx="13" fill="#ffffff" stroke="#dfe6e0"/>
    <rect x="690" y="138" width="150" height="84" rx="13" fill="#ffffff" stroke="#dfe6e0"/>
  </g>
  <rect x="440" y="138" width="200" height="28" rx="13" fill="url(#hct)"/><rect x="440" y="154" width="200" height="12" fill="url(#hct)"/>
  <g text-anchor="middle">
    <text x="115" y="172" font-size="15" font-weight="700" fill="#152019">IMDb dataset</text>
    <text x="115" y="195" font-size="13" fill="#46514b">text + label</text>
    <text x="315" y="172" font-size="15" font-weight="700" fill="#152019">Tokenizer</text>
    <text x="315" y="195" font-size="13" fill="#46514b">text → token IDs</text>
    <text x="540" y="158" font-size="14" font-weight="700" fill="#fff">DistilBERT</text>
    <text x="540" y="192" font-size="13" fill="#46514b">+ classification</text>
    <text x="540" y="209" font-size="13" fill="#46514b">head</text>
    <text x="765" y="172" font-size="15" font-weight="700" fill="#152019">Trainer</text>
    <text x="765" y="195" font-size="13" fill="#46514b">loss ↓, epochs</text>
  </g>
  <g stroke="#0b7d4f" stroke-width="3" marker-end="url(#act)" fill="none">
    <line x1="192" y1="180" x2="236" y2="180"/>
    <line x1="392" y1="180" x2="436" y2="180"/>
    <line x1="642" y1="180" x2="686" y2="180"/>
  </g>

  <!-- USE row -->
  <text x="40" y="282" font-size="12" font-weight="800" letter-spacing="1" fill="#0b7d4f">EVALUATE · SAVE · USE</text>
  <g filter="url(#sct)">
    <rect x="40"  y="296" width="180" height="84" rx="13" fill="#ffffff" stroke="#dfe6e0"/>
    <rect x="270" y="296" width="180" height="84" rx="13" fill="#ffffff" stroke="#dfe6e0"/>
    <rect x="500" y="296" width="180" height="84" rx="13" fill="#eaf6ef" stroke="#9ed7bb"/>
  </g>
  <g text-anchor="middle">
    <text x="130" y="330" font-size="15" font-weight="700" fill="#152019">Evaluate</text>
    <text x="130" y="353" font-size="13" fill="#46514b">accuracy · F1</text>
    <text x="360" y="330" font-size="15" font-weight="700" fill="#152019">Save model</text>
    <text x="360" y="353" font-size="13" fill="#46514b">weights + tokenizer</text>
    <text x="590" y="330" font-size="15" font-weight="700" fill="#0b5a3f">Inference</text>
    <text x="590" y="353" font-size="13" fill="#0b5a3f">pipeline() → label</text>
  </g>
  <path d="M765 222 L765 260 L130 260 L130 292" stroke="#0b7d4f" stroke-width="3" fill="none" marker-end="url(#act)"/>
  <g stroke="#0b7d4f" stroke-width="3" marker-end="url(#act)" fill="none">
    <line x1="220" y1="338" x2="266" y2="338"/>
    <line x1="450" y1="338" x2="496" y2="338"/>
  </g>
  <g text-anchor="middle" font-family="monospace" font-size="13" fill="#0b5a3f">
    <text x="590" y="408">"masterpiece" → positive 0.98</text>
  </g>
</svg>
