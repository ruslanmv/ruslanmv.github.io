<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 430" width="100%" role="img" aria-label="The Agent Credit System: collateralized lending in MXU">
  <defs>
    <marker id="m2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#36c9a8"/>
    </marker>
    <marker id="m2r" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#ff7a59"/>
    </marker>
    <style>
      .lbl{font-family:Trebuchet MS,Verdana,Arial,sans-serif;}
      .nt{font-weight:700;font-size:15px;fill:#0b1020;text-anchor:middle;}
      .ns{font-size:11.5px;fill:#21405e;text-anchor:middle;}
    </style>
  </defs>
  <rect width="880" height="430" fill="#0d1426"/>
  <text class="lbl" x="440" y="36" font-size="19" font-weight="800" fill="#eaf6ff" text-anchor="middle">The Agent Credit System</text>
  <text class="lbl" x="440" y="58" font-size="12.5" fill="#7fa7cf" text-anchor="middle">collateral-based lending — borrow operating capital in MXU</text>

  <!-- Agent -->
  <rect rx="14" x="60" y="170" width="190" height="92" fill="#bfe9ff" stroke="#5fb4e6" stroke-width="2"/>
  <text class="lbl nt" x="155" y="206">Agent</text>
  <text class="lbl ns" x="155" y="228">needs working capital</text>

  <!-- Treasury lender -->
  <rect rx="14" x="630" y="170" width="190" height="92" fill="#8ff0d6" stroke="#36c9a8" stroke-width="2"/>
  <text class="lbl nt" x="725" y="206">Treasury</text>
  <text class="lbl ns" x="725" y="228">issues the loan</text>

  <!-- collateral lock -->
  <rect rx="12" x="370" y="92" width="150" height="62" fill="#ffd980" stroke="#ffb43c" stroke-width="2"/>
  <text class="lbl nt" x="445" y="116">Collateral</text>
  <text class="lbl ns" x="445" y="136">≥ 150% locked in MXU</text>

  <!-- flows -->
  <path class="lbl" d="M250 195 C330 150 360 140 372 132" stroke="#ffb43c" stroke-width="2" fill="none" marker-end="url(#m2r)" opacity="0.9"/>
  <text class="lbl" x="300" y="150" font-size="11.5" fill="#ffce7a" text-anchor="middle">2 · locks collateral ≥150%</text>

  <path class="lbl" d="M250 205 H626" stroke="#9fc4ff" stroke-width="2" fill="none" marker-end="url(#m2)"/>
  <text class="lbl" x="440" y="196" font-size="11.5" fill="#bcd6f5" text-anchor="middle">1 · requests loan (MXU)</text>

  <path class="lbl" d="M626 235 H254" stroke="#36c9a8" stroke-width="2" fill="none" marker-end="url(#m2)"/>
  <text class="lbl" x="440" y="255" font-size="11.5" fill="#8ff0d6" text-anchor="middle">3 · approved → disbursed (interest-bearing)</text>

  <!-- liquidation -->
  <rect rx="12" x="345" y="316" width="200" height="58" fill="#3a1f24" stroke="#ff7a59" stroke-width="2"/>
  <text class="lbl" x="445" y="340" font-size="13.5" font-weight="700" fill="#ff9b7e" text-anchor="middle">Automatic liquidation</text>
  <text class="lbl" x="445" y="358" font-size="11" fill="#d79a86" text-anchor="middle">if collateral ratio falls below threshold</text>
  <path class="lbl" d="M445 154 V312" stroke="#ff7a59" stroke-width="1.8" stroke-dasharray="5 4" fill="none" marker-end="url(#m2r)"/>

  <text class="lbl" x="440" y="406" font-size="12" fill="#5d7ea0" text-anchor="middle" font-style="italic">Over-collateralized, interest-bearing, self-policing — Darwinism rendered as a balance sheet.</text>
</svg>
