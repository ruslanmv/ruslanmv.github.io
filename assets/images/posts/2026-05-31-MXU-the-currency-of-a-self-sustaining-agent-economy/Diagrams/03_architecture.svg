<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 470" width="100%" role="img" aria-label="Matrix Treasury system architecture">
  <defs>
    <marker id="d" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#6ea8d8"/>
    </marker>
    <style>
      .lbl{font-family:Trebuchet MS,Verdana,Arial,sans-serif;}
      .t{font-weight:700;font-size:14.5px;text-anchor:middle;}
      .s{font-size:11px;text-anchor:middle;fill:#21405e;}
      .layer{font-size:11px;fill:#5d7ea0;text-anchor:end;font-style:italic;}
      .edge{stroke:#6ea8d8;stroke-width:2;fill:none;}
    </style>
  </defs>
  <rect width="880" height="470" fill="#0d1426"/>
  <text class="lbl" x="440" y="32" font-size="19" font-weight="800" fill="#eaf6ff" text-anchor="middle">Matrix Treasury — System Architecture</text>

  <!-- Agent layer -->
  <text class="lbl layer" x="200" y="78">Agent Layer</text>
  <g>
    <rect rx="10" x="250" y="58" width="110" height="44" fill="#bfe9ff" stroke="#5fb4e6" stroke-width="1.8"/>
    <text class="lbl t" x="305" y="85" fill="#0b1020">Agent 1</text>
    <rect rx="10" x="385" y="58" width="110" height="44" fill="#bfe9ff" stroke="#5fb4e6" stroke-width="1.8"/>
    <text class="lbl t" x="440" y="85" fill="#0b1020">Agent 2</text>
    <rect rx="10" x="520" y="58" width="110" height="44" fill="#bfe9ff" stroke="#5fb4e6" stroke-width="1.8"/>
    <text class="lbl t" x="575" y="85" fill="#0b1020">Agent N</text>
  </g>

  <!-- API Gateway -->
  <text class="lbl layer" x="200" y="152">Interface</text>
  <rect rx="10" x="250" y="128" width="380" height="46" fill="#9fc4ff" stroke="#5a86c8" stroke-width="1.8"/>
  <text class="lbl t" x="440" y="150" fill="#0b1020">API Gateway</text>
  <text class="lbl s" x="440" y="166">FastAPI · REST</text>

  <!-- Economic Engine band -->
  <text class="lbl layer" x="200" y="232">Economic Engine</text>
  <rect rx="12" x="232" y="196" width="416" height="120" fill="#101d3a" stroke="#3a5b8c" stroke-width="1.5"/>
  <text class="lbl s" x="440" y="214" fill="#9fc4ff" font-weight="700">MXU accounting · Metering · Stabilizers · Governance</text>
  <rect rx="9" x="246" y="226" width="120" height="74" fill="#8ff0d6" stroke="#36c9a8" stroke-width="1.6"/>
  <text class="lbl t" x="306" y="252" fill="#0b1020">Treasury</text>
  <text class="lbl s" x="306" y="270">Manager</text>
  <text class="lbl s" x="306" y="286">multi-vault</text>
  <rect rx="9" x="380" y="226" width="120" height="74" fill="#c9c3ff" stroke="#8e82e6" stroke-width="1.6"/>
  <text class="lbl t" x="440" y="252" fill="#0b1020">AI CFO</text>
  <text class="lbl s" x="440" y="270">LLM-powered</text>
  <text class="lbl s" x="440" y="286">decisions</text>
  <rect rx="9" x="514" y="226" width="120" height="74" fill="#ffd980" stroke="#ffb43c" stroke-width="1.6"/>
  <text class="lbl t" x="574" y="252" fill="#0b1020">Analytics</text>
  <text class="lbl s" x="574" y="270">real-time +</text>
  <text class="lbl s" x="574" y="286">ML fraud</text>

  <!-- Database layer -->
  <text class="lbl layer" x="200" y="372">Persistence</text>
  <rect rx="10" x="250" y="348" width="180" height="46" fill="#b9c6d8" stroke="#7c8ba0" stroke-width="1.8"/>
  <text class="lbl t" x="340" y="370" fill="#0b1020">PostgreSQL</text>
  <text class="lbl s" x="340" y="386">durable ledger</text>
  <rect rx="10" x="450" y="348" width="180" height="46" fill="#b9c6d8" stroke="#7c8ba0" stroke-width="1.8"/>
  <text class="lbl t" x="540" y="370" fill="#0b1020">Redis</text>
  <text class="lbl s" x="540" y="386">caching</text>

  <!-- connectors -->
  <path class="edge" d="M440 102 V126" marker-end="url(#d)"/>
  <path class="edge" d="M440 174 V194" marker-end="url(#d)"/>
  <path class="edge" d="M440 316 V346" marker-end="url(#d)"/>

  <text class="lbl" x="440" y="436" font-size="12" fill="#5d7ea0" text-anchor="middle" font-style="italic">Agents spend MXU through the gateway; the Economic Engine meters, decides, and settles against real vaults.</text>
  <text class="lbl" x="440" y="456" font-size="11" fill="#4d6a88" text-anchor="middle">Scales to thousands of concurrent agents</text>
</svg>
