<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 440" width="100%" role="img" aria-label="MXU — the internal unit of the Matrix Treasury">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="0.55" stop-color="#0f1b3d"/>
      <stop offset="1" stop-color="#08131f"/>
    </linearGradient>
    <linearGradient id="compute" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7fd0ff"/>
      <stop offset="1" stop-color="#3a8aff"/>
    </linearGradient>
    <linearGradient id="reserve" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#36e0a0"/>
      <stop offset="1" stop-color="#ffcf5c"/>
    </linearGradient>
    <radialGradient id="core" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.35" stop-color="#bfe9ff"/>
      <stop offset="1" stop-color="#1f6fb2"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="440" fill="url(#bg)"/>
  <g opacity="0.10" stroke="#9fd0ff" stroke-width="1">
    <path d="M0 110 H1200 M0 220 H1200 M0 330 H1200"/>
    <path d="M200 0 V440 M400 0 V440 M600 0 V440 M800 0 V440 M1000 0 V440"/>
  </g>

  <!-- left: compute consumed -->
  <g font-family="Trebuchet MS, Verdana, Arial, sans-serif">
    <text x="150" y="200" fill="url(#compute)" font-size="21" font-weight="700" text-anchor="middle">COMPUTE</text>
    <text x="150" y="226" fill="#9fb6d6" font-size="13.5" text-anchor="middle">consumed · metered</text>
    <path d="M250 213 H470" stroke="url(#compute)" stroke-width="5" stroke-linecap="round" filter="url(#glow)"/>
    <path d="M455 203 L478 213 L455 223 Z" fill="#3a8aff"/>
    <text x="360" y="200" fill="#bcd6f5" font-size="12.5" text-anchor="middle">charged in →</text>
  </g>

  <!-- center core: MXU -->
  <g filter="url(#glow)">
    <circle cx="600" cy="213" r="92" fill="url(#core)" opacity="0.92"/>
    <circle cx="600" cy="213" r="92" fill="none" stroke="#eaf6ff" stroke-width="2" opacity="0.7"/>
  </g>
  <text x="600" y="222" fill="#0b1020" font-size="62" font-weight="800" text-anchor="middle" font-family="Trebuchet MS, Verdana, Arial, sans-serif">MXU</text>
  <text x="600" y="250" fill="#11314c" font-size="14" font-weight="600" text-anchor="middle" font-family="Trebuchet MS, Verdana, Arial, sans-serif">Matrix Unit</text>

  <!-- right: treasury reserves -->
  <g font-family="Trebuchet MS, Verdana, Arial, sans-serif">
    <path d="M730 213 H950" stroke="url(#reserve)" stroke-width="5" stroke-linecap="round" filter="url(#glow)"/>
    <path d="M935 203 L958 213 L935 223 Z" fill="#36e0a0"/>
    <text x="850" y="200" fill="#cfe9d8" font-size="12.5" text-anchor="middle">← settled against</text>
    <text x="1050" y="200" fill="url(#reserve)" font-size="21" font-weight="700" text-anchor="middle">TREASURY</text>
    <text x="1050" y="226" fill="#9fb6d6" font-size="13.5" text-anchor="middle">USD · EUR · BTC reserves</text>
  </g>

  <text x="600" y="68" fill="#eaf6ff" font-size="33" font-weight="800" text-anchor="middle" font-family="Trebuchet MS, Verdana, Arial, sans-serif">The Currency of a Self-Sustaining Agent Economy</text>
  <text x="600" y="392" fill="#7fa7cf" font-size="16.5" text-anchor="middle" font-family="Trebuchet MS, Verdana, Arial, sans-serif">The internal unit every agent spends to pay for the compute it consumes</text>
</svg>
