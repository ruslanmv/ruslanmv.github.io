<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 660" width="1280" height="660" role="img" aria-label="The A2A validation flow: a base URL is normalized to /.well-known/agent.json, fetched, parsed, and shape-checked against six required fields and the skills array, producing a valid or invalid verdict. Silas and PostalForm pass; example.com returns 404 and fails.">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0a2218"/><stop offset="1" stop-color="#05110b"/></linearGradient>
    <radialGradient id="ok" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#7dffd0"/><stop offset="1" stop-color="#0a7d4f"/></radialGradient>
    <radialGradient id="bad" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#ff9b9b"/><stop offset="1" stop-color="#8a1f1f"/></radialGradient>
  </defs>
  <rect width="1280" height="660" fill="url(#bg4)"/>
  <g opacity="0.06" stroke="#7ef0b0"><path d="M0 165 H1280 M0 330 H1280 M0 495 H1280"/></g>

  <text x="64" y="62" fill="#eaf3ee" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="32" font-weight="800">How the A2A Validator checks an agent</text>
  <text x="64" y="94" fill="#9fcdb7" font-family="Trebuchet MS, sans-serif" font-size="17">Normalize → fetch → parse → shape-check the six required fields and the skills array.</text>

  <!-- pipeline -->
  <g font-family="Trebuchet MS, sans-serif">
    <g transform="translate(64,140)">
      <rect width="250" height="120" rx="14" fill="#0d3322" stroke="#2fd987" stroke-width="2"/>
      <text x="125" y="40" fill="#eaf3ee" font-size="18" font-weight="800" text-anchor="middle">1 · Normalize</text>
      <text x="125" y="70" fill="#7fb79a" font-family="JetBrains Mono, ui-monospace, monospace" font-size="12" text-anchor="middle">base URL +</text>
      <text x="125" y="92" fill="#7fb79a" font-family="JetBrains Mono, ui-monospace, monospace" font-size="11.5" text-anchor="middle">/.well-known/agent.json</text>
    </g>
    <g transform="translate(354,140)">
      <rect width="250" height="120" rx="14" fill="#0d3322" stroke="#2fd987" stroke-width="2"/>
      <text x="125" y="40" fill="#eaf3ee" font-size="18" font-weight="800" text-anchor="middle">2 · Fetch (GET)</text>
      <text x="125" y="70" fill="#7fb79a" font-family="JetBrains Mono, ui-monospace, monospace" font-size="12" text-anchor="middle">HTTPS · auth header</text>
      <text x="125" y="92" fill="#7fb79a" font-family="JetBrains Mono, ui-monospace, monospace" font-size="12" text-anchor="middle">block private IPs</text>
    </g>
    <g transform="translate(644,140)">
      <rect width="250" height="120" rx="14" fill="#0d3322" stroke="#2fd987" stroke-width="2"/>
      <text x="125" y="40" fill="#eaf3ee" font-size="18" font-weight="800" text-anchor="middle">3 · Parse JSON</text>
      <text x="125" y="70" fill="#7fb79a" font-family="JetBrains Mono, ui-monospace, monospace" font-size="12" text-anchor="middle">check Content-Type</text>
      <text x="125" y="92" fill="#7fb79a" font-family="JetBrains Mono, ui-monospace, monospace" font-size="12" text-anchor="middle">warn if not json</text>
    </g>
    <g transform="translate(934,140)">
      <rect width="282" height="120" rx="14" fill="#0d3322" stroke="#2fd987" stroke-width="2"/>
      <text x="141" y="36" fill="#eaf3ee" font-size="18" font-weight="800" text-anchor="middle">4 · Shape-check</text>
      <text x="141" y="64" fill="#cdeedd" font-family="JetBrains Mono, ui-monospace, monospace" font-size="11.5" text-anchor="middle">name · description · url</text>
      <text x="141" y="84" fill="#cdeedd" font-family="JetBrains Mono, ui-monospace, monospace" font-size="11.5" text-anchor="middle">version · capabilities · skills</text>
      <text x="141" y="104" fill="#7fb79a" font-family="JetBrains Mono, ui-monospace, monospace" font-size="11.5" text-anchor="middle">+ per-skill id / name</text>
    </g>
  </g>
  <g stroke="#2fd987" stroke-width="3" fill="#2fd987">
    <path d="M314 200 H352" fill="none"/><path d="M352 200 l-12 -6 v12 z"/>
    <path d="M604 200 H642" fill="none"/><path d="M642 200 l-12 -6 v12 z"/>
    <path d="M894 200 H932" fill="none"/><path d="M932 200 l-12 -6 v12 z"/>
  </g>

  <!-- verdicts -->
  <text x="64" y="330" fill="#9fcdb7" font-family="Trebuchet MS, sans-serif" font-size="16">The verdict the worker returns:</text>
  <g font-family="Trebuchet MS, sans-serif">
    <!-- pass 1 -->
    <g transform="translate(64,356)">
      <rect width="360" height="120" rx="14" fill="#0c2a1c" stroke="#2fd987" stroke-width="2"/>
      <circle cx="40" cy="40" r="20" fill="url(#ok)"/><path d="M30 40 l8 9 l16 -19" fill="none" stroke="#06140e" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="74" y="36" fill="#eaf3ee" font-size="19" font-weight="800">Silas</text>
      <text x="74" y="60" fill="#7fb79a" font-family="JetBrains Mono, ui-monospace, monospace" font-size="12.5">valid · 200 · 3 skills</text>
      <text x="20" y="98" fill="#9fcdb7" font-size="13.5">streaming:false · v1.0.0</text>
    </g>
    <!-- pass 2 -->
    <g transform="translate(456,356)">
      <rect width="360" height="120" rx="14" fill="#0c2a1c" stroke="#2fd987" stroke-width="2"/>
      <circle cx="40" cy="40" r="20" fill="url(#ok)"/><path d="M30 40 l8 9 l16 -19" fill="none" stroke="#06140e" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="74" y="36" fill="#eaf3ee" font-size="19" font-weight="800">PostalForm</text>
      <text x="74" y="60" fill="#7fb79a" font-family="JetBrains Mono, ui-monospace, monospace" font-size="12.5">valid · 200 · protocolVersion 1.0</text>
      <text x="20" y="98" fill="#9fcdb7" font-size="13.5">capability extensions: x402 · UCP</text>
    </g>
    <!-- fail -->
    <g transform="translate(848,356)">
      <rect width="368" height="120" rx="14" fill="#26100f" stroke="#c8453a" stroke-width="2"/>
      <circle cx="40" cy="40" r="20" fill="url(#bad)"/><path d="M32 32 l16 16 M48 32 l-16 16" stroke="#26100f" stroke-width="5" stroke-linecap="round"/>
      <text x="74" y="36" fill="#ffd9d6" font-size="19" font-weight="800">example.com</text>
      <text x="74" y="60" fill="#e39b95" font-family="JetBrains Mono, ui-monospace, monospace" font-size="12.5">invalid · HTTP 404</text>
      <text x="20" y="98" fill="#e39b95" font-size="13.5">"Agent card endpoint returned HTTP 404."</text>
    </g>
  </g>

  <!-- note -->
  <g transform="translate(64,512)">
    <rect width="1152" height="112" rx="14" fill="#08190f" stroke="#155f39"/>
    <text x="28" y="42" fill="#eaf3ee" font-family="Trebuchet MS, sans-serif" font-size="18" font-weight="800">The negative control matters</text>
    <text x="28" y="74" fill="#9fcdb7" font-family="Trebuchet MS, sans-serif" font-size="15.5">A validator you trust must reject as confidently as it accepts. example.com has no card, so it fails fast with a clear reason —</text>
    <text x="28" y="98" fill="#9fcdb7" font-family="Trebuchet MS, sans-serif" font-size="15.5">no false "valid". Required fields all passed on the real agents; newer fields like protocolVersion are treated as optional.</text>
  </g>
</svg>
