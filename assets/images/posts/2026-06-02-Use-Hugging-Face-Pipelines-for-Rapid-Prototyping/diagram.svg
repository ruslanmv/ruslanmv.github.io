<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 440" font-family="'Hanken Grotesk',system-ui,Arial,sans-serif" role="img" aria-label="A Hugging Face pipeline wraps tokenizer, model, and post-processing behind one call">
  <defs>
    <marker id="ah4" markerWidth="12" markerHeight="12" refX="9" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#0b7d4f"/></marker>
    <filter id="sh4" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#10231a" flood-opacity="0.10"/></filter>
    <linearGradient id="hd4" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0f9d63"/><stop offset="1" stop-color="#0b5a3f"/></linearGradient>
  </defs>
  <rect width="1200" height="440" fill="#f8faf8"/>
  <text x="40" y="54" font-size="26" font-weight="800" fill="#152019">One call, three steps: the pipeline abstraction</text>
  <text x="40" y="84" font-size="16" fill="#5c6b63">pipeline("sentiment-analysis") hides tokenizer, model, and post-processing.</text>

  <!-- input -->
  <g filter="url(#sh4)"><rect x="40" y="200" width="150" height="80" rx="14" fill="#ffffff" stroke="#dfe6e0"/></g>
  <text x="115" y="235" font-size="15" font-weight="700" fill="#152019" text-anchor="middle">Raw text</text>
  <text x="115" y="258" font-size="13" fill="#46514b" text-anchor="middle">"I love this!"</text>

  <!-- the pipeline box containing 3 stages -->
  <g filter="url(#sh4)"><rect x="240" y="150" width="700" height="180" rx="18" fill="#ffffff" stroke="#9ed7bb" stroke-width="2"/></g>
  <rect x="240" y="150" width="700" height="40" rx="18" fill="url(#hd4)"/><rect x="240" y="172" width="700" height="18" fill="url(#hd4)"/>
  <text x="590" y="177" font-size="16" font-weight="800" fill="#fff" text-anchor="middle" font-family="monospace">pipeline("sentiment-analysis")</text>

  <g filter="url(#sh4)">
    <rect x="270" y="215" width="180" height="86" rx="12" fill="#f1f8f3" stroke="#cfe0d8"/>
    <rect x="500" y="215" width="180" height="86" rx="12" fill="#f1f8f3" stroke="#cfe0d8"/>
    <rect x="730" y="215" width="180" height="86" rx="12" fill="#f1f8f3" stroke="#cfe0d8"/>
  </g>
  <g text-anchor="middle">
    <text x="360" y="248" font-size="15" font-weight="700" fill="#0b5a3f">1 · Tokenizer</text>
    <text x="360" y="274" font-size="13" fill="#46514b">text → token IDs</text>
    <text x="590" y="248" font-size="15" font-weight="700" fill="#0b5a3f">2 · Model</text>
    <text x="590" y="274" font-size="13" fill="#46514b">forward → logits</text>
    <text x="820" y="248" font-size="15" font-weight="700" fill="#0b5a3f">3 · Post-process</text>
    <text x="820" y="274" font-size="13" fill="#46514b">softmax → label</text>
  </g>
  <g stroke="#0b7d4f" stroke-width="3" marker-end="url(#ah4)" fill="none">
    <line x1="450" y1="258" x2="496" y2="258"/>
    <line x1="680" y1="258" x2="726" y2="258"/>
  </g>

  <!-- output -->
  <g filter="url(#sh4)"><rect x="990" y="200" width="170" height="80" rx="14" fill="#eaf6ef" stroke="#9ed7bb"/></g>
  <text x="1075" y="232" font-size="15" font-weight="700" fill="#0b5a3f" text-anchor="middle">Result</text>
  <text x="1075" y="256" font-size="13" fill="#0b5a3f" text-anchor="middle" font-family="monospace">POSITIVE · 0.99</text>

  <line x1="192" y1="240" x2="236" y2="240" stroke="#0b7d4f" stroke-width="3" marker-end="url(#ah4)"/>
  <line x1="942" y1="240" x2="986" y2="240" stroke="#0b7d4f" stroke-width="3" marker-end="url(#ah4)"/>
</svg>
