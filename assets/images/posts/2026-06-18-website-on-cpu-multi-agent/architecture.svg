<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 420" font-family="'Hanken Grotesk',system-ui,Segoe UI,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#062315"/><stop offset="1" stop-color="#02170f"/>
    </linearGradient>
    <marker id="arr" markerWidth="11" markerHeight="11" refX="8" refY="5.5" orient="auto">
      <path d="M1,1 L9,5.5 L1,10" fill="none" stroke="#53f39d" stroke-width="1.8"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1160" height="420" rx="22" fill="url(#bg)"/>

  <!-- laptop / local container -->
  <rect x="28" y="92" width="924" height="220" rx="18" fill="none" stroke="rgba(120,200,160,.30)" stroke-dasharray="6 6"/>
  <text x="48" y="120" fill="#7fb8a0" font-size="13" font-family="monospace">YOUR LAPTOP · CPU ONLY · NO GPU · NO CLOUD</text>

  <!-- pipeline boxes -->
  <!-- 1 Ollama -->
  <g>
    <rect x="56" y="150" width="190" height="120" rx="14" fill="#0a2a1d" stroke="rgba(120,200,160,.35)"/>
    <text x="151" y="184" text-anchor="middle" fill="#53f39d" font-size="17" font-weight="700">Ollama</text>
    <text x="151" y="210" text-anchor="middle" fill="#cfe8db" font-size="12.5">local model runtime</text>
    <text x="151" y="232" text-anchor="middle" fill="#9bbcad" font-size="11.5" font-family="monospace">qwen2.5-coder:1.5b</text>
    <text x="151" y="252" text-anchor="middle" fill="#88ab9c" font-size="11" font-family="monospace">:11434</text>
  </g>
  <!-- 2 OllaBridge -->
  <g>
    <rect x="288" y="150" width="190" height="120" rx="14" fill="#0a2a1d" stroke="rgba(120,200,160,.35)"/>
    <text x="383" y="184" text-anchor="middle" fill="#53f39d" font-size="17" font-weight="700">🌉 OllaBridge</text>
    <text x="383" y="210" text-anchor="middle" fill="#cfe8db" font-size="12.5">OpenAI-compatible</text>
    <text x="383" y="230" text-anchor="middle" fill="#cfe8db" font-size="12.5">gateway</text>
    <text x="383" y="252" text-anchor="middle" fill="#88ab9c" font-size="11" font-family="monospace">:11435 /v1</text>
  </g>
  <!-- 3 GitPilot -->
  <g>
    <rect x="520" y="150" width="190" height="120" rx="14" fill="#0a2a1d" stroke="rgba(120,200,160,.35)"/>
    <text x="615" y="184" text-anchor="middle" fill="#53f39d" font-size="17" font-weight="700">🚁 GitPilot</text>
    <text x="615" y="210" text-anchor="middle" fill="#cfe8db" font-size="12.5">the AI coder</text>
    <text x="615" y="232" text-anchor="middle" fill="#9bbcad" font-size="11.5">writes the files</text>
  </g>
  <!-- 4 Matrix Builder -->
  <g>
    <rect x="752" y="150" width="184" height="120" rx="14" fill="#0a2a1d" stroke="rgba(120,200,160,.35)"/>
    <text x="844" y="184" text-anchor="middle" fill="#53f39d" font-size="16" font-weight="700">◆ Matrix Builder</text>
    <text x="844" y="210" text-anchor="middle" fill="#cfe8db" font-size="12.5">governance</text>
    <text x="844" y="232" text-anchor="middle" fill="#9bbcad" font-size="11.5" font-family="monospace">mb check</text>
    <text x="844" y="252" text-anchor="middle" fill="#88ab9c" font-size="11">fail-closed</text>
  </g>

  <!-- arrows between boxes -->
  <line x1="246" y1="210" x2="286" y2="210" stroke="#53f39d" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="478" y1="210" x2="518" y2="210" stroke="#53f39d" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="710" y1="210" x2="750" y2="210" stroke="#53f39d" stroke-width="2" marker-end="url(#arr)"/>

  <!-- result -->
  <rect x="986" y="150" width="146" height="120" rx="14" fill="#10331f" stroke="#22c878"/>
  <text x="1059" y="200" text-anchor="middle" fill="#eafff4" font-size="15" font-weight="700">✅ Website</text>
  <text x="1059" y="224" text-anchor="middle" fill="#9bbcad" font-size="12">index.html</text>
  <line x1="936" y1="210" x2="984" y2="210" stroke="#53f39d" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Matrix Designer feeding the plan -->
  <rect x="288" y="36" width="422" height="44" rx="12" fill="#0d2540" stroke="rgba(138,99,210,.5)"/>
  <text x="499" y="63" text-anchor="middle" fill="#b9a3ff" font-size="14" font-weight="700">🧠 Matrix Designer — the multi-agent brain plans the batches</text>
  <line x1="499" y1="80" x2="499" y2="148" stroke="#8a63d2" stroke-width="2" stroke-dasharray="5 5" marker-end="url(#arr)"/>

  <text x="580" y="360" text-anchor="middle" fill="#7fb8a0" font-size="13">Everything runs on one machine — no API keys, no GPU, no external calls.</text>
</svg>
