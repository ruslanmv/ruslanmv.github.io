  <text x="184" y="150" font-size="30" font-weight="600" fill="#f7fff9">Matrix Builder</text>

  <text x="118" y="290" font-size="118" font-weight="600" fill="#f7fff9" letter-spacing="-3">Git for <tspan font-style="italic" fill="#53f39d">AI</tspan>.</text>
  <text x="122" y="356" font-size="30" fill="#a7c9b8" font-family="'Segoe UI',Helvetica,Arial,sans-serif">Give AI coders a contract, not a prompt.</text>

  <!-- terminal card -->
  <g transform="translate(118,410)" font-family="'JetBrains Mono',Consolas,monospace">
    <rect x="0" y="0" width="1364" height="150" rx="16" fill="rgba(1,14,9,0.82)" stroke="#1f5238"/>
    <circle cx="26" cy="26" r="6" fill="#ff5f57"/><circle cx="48" cy="26" r="6" fill="#febc2e"/><circle cx="70" cy="26" r="6" fill="#28c840"/>
    <text x="26" y="74" font-size="22" fill="#cfe6da"><tspan fill="#53f39d" font-weight="600">$ mb</tspan> init "A GitHub repo intelligence agent" --quality standard</text>
    <text x="26" y="108" font-size="22" fill="#cfe6da"><tspan fill="#53f39d" font-weight="600">$ mb</tspan> check backend/app/api/routes.py</text>
    <text x="26" y="134" font-size="20" fill="#7dffb5">MATRIX_STATUS: approved  ·  committed mc-454fa2735cd7</text>
