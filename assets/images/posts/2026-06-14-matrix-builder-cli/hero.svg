      <stop offset="0" stop-color="#0a3a24"/>
      <stop offset="0.45" stop-color="#04190f"/>
      <stop offset="1" stop-color="#010d08"/>
    </radialGradient>
    <marker id="hb-ar" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0 0L7 3L0 6Z" fill="#53f39d"/></marker>
