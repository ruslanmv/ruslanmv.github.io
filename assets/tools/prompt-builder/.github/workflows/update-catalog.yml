# Portable refresh workflow — used when this prompt-builder/ folder is published
# as its OWN GitHub repository (root = this folder).
#
# Inside the ruslanmv.com site repo, the functional workflow lives at the repo
# root: .github/workflows/update-prompt-catalog.yml. GitHub only runs workflows
# from the repository-root .github/workflows/, so this file is documentation /
# portability and will not trigger from a subfolder.
name: Update Prompt Catalog

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"   # Mondays 06:00 UTC

permissions:
  contents: write

jobs:
  update-catalog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install optional deps
        run: pip install pyyaml
      - name: Build catalog
        run: python3 scripts/build_catalog.py
      - name: Commit updated catalog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/prompts.catalog.json data/prompts.catalog.min.json data/prompts.catalog.txt
          git commit -m "chore: refresh prompt catalog" || echo "No changes"
          git push
