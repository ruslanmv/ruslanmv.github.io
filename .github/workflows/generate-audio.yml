name: Generate blog audio

# Generates MP3 narration only for Markdown pages with `audio: true`, and only
# when the narrated text (or voice/speed/model/bitrate/normalization) changed.
# The content hash in _data/audio_manifest.json is the cache key, so unchanged
# essays never trigger a slow TTS run. New/changed MP3s are uploaded to R2 and
# the manifest is committed back.

on:
  workflow_dispatch:
    inputs:
      path:
        description: "Single Markdown file to generate, or empty for all"
        required: false
        default: ""
      force:
        description: "Force regenerate audio (ignore content hash)"
        required: false
        default: "false"
  push:
    paths:
      - "_pages/**/*.md"
      - "_posts/**/*.md"
      - "scripts/generate_audio.py"
      - "requirements.txt"
      - ".github/workflows/generate-audio.yml"

permissions:
  contents: write

jobs:
  generate-audio:
    runs-on: ubuntu-latest

    env:
      # --- generation settings ---
      # Voice/speed/bitrate come from _data/audio_settings.yml (single source of
      # truth). Only the model filenames are pinned here for the download cache.
      POSTS_DIR: _posts
      AUDIO_OUT_DIR: public/audio
      MANIFEST_PATH: _data/audio_manifest.json
      KOKORO_MODEL: kokoro-v1.0.fp16.onnx
      KOKORO_VOICES: voices-v1.0.bin
      # --- R2 / S3 (secrets; the secret access key is never logged) ---
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL || 'https://pub-18ecc6bab6074b2e89efa5c36d39a544.r2.dev' }}
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: auto

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg espeak-ng

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies (uv)
        run: |
          python -m pip install --upgrade pip uv
          uv pip install --system ".[upload]"   # core generation deps + AWS CLI, from pyproject.toml

      - name: Cache Kokoro model files
        uses: actions/cache@v4
        with:
          path: |
            kokoro-v1.0.fp16.onnx
            voices-v1.0.bin
          key: kokoro-onnx-v1-fp16

      - name: Download Kokoro model files if missing
        run: python scripts/generate_audio.py --ensure-models

      # The script itself decides what to skip via the manifest content hash and
      # an optional R2 head-object check, so we never blindly regenerate.
      - name: Generate only missing or changed audio
        run: |
          force_flag=""
          if [ "${{ inputs.force }}" = "true" ]; then
            force_flag="--force"
          fi
          if [ -n "${{ inputs.path }}" ]; then
            python scripts/generate_audio.py "${{ inputs.path }}" $force_flag
          else
            python scripts/generate_audio.py --all $force_flag
          fi

      - name: Upload new or changed MP3s to Cloudflare R2
        run: |
          aws s3 sync "${AUDIO_OUT_DIR}/essays" "s3://${R2_BUCKET}/essays" \
            --endpoint-url "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com" \
            --content-type audio/mpeg \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*" \
            --include "*.mp3"

      - name: Commit updated audio manifest
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/audio_manifest.json
          if git diff --cached --quiet; then
            echo "No manifest changes."
          else
            git commit -m "chore(audio): refresh narration manifest [skip ci]"
            git push
          fi
