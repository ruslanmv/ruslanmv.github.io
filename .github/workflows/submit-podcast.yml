name: Submit podcast feed to directories

# Registers / refreshes https://ruslanmv.com/podcast.xml in open podcast
# directories that expose an API (Podcast Index, and optionally Listen Notes).
#
# The feed is generated by Jekyll and only goes live once GitHub Pages has
# deployed, so this runs AFTER the "Deploy Jekyll site to Pages" workflow
# succeeds — guaranteeing the directory reads a fresh feed. It can also be run
# manually. Submission is idempotent: an already-indexed feed is a no-op, and
# new episodes are then picked up from the feed automatically.

on:
  workflow_dispatch:
    inputs:
      feed_url:
        description: "Feed URL to submit"
        required: false
        default: "https://ruslanmv.com/podcast.xml"
  workflow_run:
    workflows: ["Deploy Jekyll site to Pages"]
    types: [completed]

permissions:
  contents: read

concurrency:
  group: submit-podcast
  cancel-in-progress: false

jobs:
  submit:
    runs-on: ubuntu-latest
    # On deploy completion only proceed if the deploy actually succeeded.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    env:
      # Default feed; the manual dispatch input overrides it when provided.
      PODCAST_FEED_URL: ${{ github.event.inputs.feed_url || 'https://ruslanmv.com/podcast.xml' }}
      PODCAST_OWNER_EMAIL: contact@ruslanmv.com
      # Job-level so the Listen Notes step's `if:` can read it.
      LISTEN_NOTES_API_KEY: ${{ secrets.LISTEN_NOTES_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Submit to Podcast Index
        env:
          PODCAST_INDEX_KEY: ${{ secrets.PODCAST_INDEX_KEY }}
          PODCAST_INDEX_SECRET: ${{ secrets.PODCAST_INDEX_SECRET }}
        run: python scripts/submit_podcast_index.py

      - name: Submit to Listen Notes (optional)
        if: ${{ env.LISTEN_NOTES_API_KEY != '' }}
        run: python scripts/submit_listennotes.py
